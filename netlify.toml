[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."push-dispatch"]
  schedule = "* * * * *"

[[redirects]]
  from = "/api/push/public-key"
  to = "/.netlify/functions/push-public-key"
  status = 200

[[redirects]]
  from = "/api/push/subscribe"
  to = "/.netlify/functions/push-subscribe"
  status = 200

[[redirects]]
  from = "/api/billing/create-checkout"
  to = "/.netlify/functions/create-checkout"
  status = 200

[[redirects]]
  from = "/api/billing/webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

[[redirects]]
  from = "/api/admin/broadcast"
  to = "/.netlify/functions/admin-broadcast"
  status = 200

[[redirects]]
  from = "/api/admin/users"
  to = "/.netlify/functions/admin-users"
  status = 200

[[redirects]]
  from = "/api/admin/settings"
  to = "/.netlify/functions/admin-settings"
  status = 200

[[redirects]]
  from = "/api/audio/premium-url"
  to = "/.netlify/functions/premium-audio-url"
  status = 200

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/javascript; charset=utf-8"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type = "application/manifest+json; charset=utf-8"

[[redirects]]
  from = "/api/passkeys/register-options"
  to = "/.netlify/functions/passkey-register-options"
  status = 200

[[redirects]]
  from = "/api/passkeys/register-verify"
  to = "/.netlify/functions/passkey-register-verify"
  status = 200

[[redirects]]
  from = "/api/passkeys/auth-options"
  to = "/.netlify/functions/passkey-auth-options"
  status = 200

[[redirects]]
  from = "/api/passkeys/auth-verify"
  to = "/.netlify/functions/passkey-auth-verify"
  status = 200

[[redirects]]
  from = "/api/account/delete"
  to = "/.netlify/functions/delete-account"
  status = 200

[[headers]]
  for = "/advanced-features.js"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/advanced-features.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/css; charset=utf-8"
