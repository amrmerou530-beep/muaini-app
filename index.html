/* =========================================================
   مُعيني 8.0 — نظام تصميم موحّد
   1) متغيرات الألوان والثيمات
   2) الهيكل والتنقل
   3) المكونات المشتركة
   4) الصفحات
   5) الاستجابة للموبايل
========================================================= */

:root {
  --sidebar-width: 248px;
  --topbar-height: 68px;
  --radius-xl: 26px;
  --radius-lg: 20px;
  --radius-md: 15px;
  --radius-sm: 11px;
  --transition: .22s ease;
  --font-arabic: "Tahoma", "Arial", "Noto Sans Arabic", sans-serif;
}

body[data-theme="night"] {
  --bg: #03130f;
  --bg-deep: #020d0a;
  --surface: rgba(7, 39, 30, .90);
  --surface-solid: #08271e;
  --surface-2: #0a3327;
  --surface-3: rgba(255, 255, 255, .035);
  --surface-soft: rgba(24, 91, 68, .24);
  --text: #f6f0df;
  --text-soft: #dce7df;
  --muted: #9cb7aa;
  --accent: #e5b65c;
  --accent-strong: #f4ca76;
  --accent-ink: #10251d;
  --green: #71d28e;
  --green-strong: #44b76a;
  --danger: #e77777;
  --warning: #f0ad5c;
  --border: rgba(229, 182, 92, .25);
  --border-soft: rgba(229, 182, 92, .12);
  --shadow: 0 18px 50px rgba(0, 0, 0, .30);
  --shadow-soft: 0 10px 28px rgba(0, 0, 0, .18);
  --hero-glow: rgba(229, 182, 92, .20);
  --pattern: rgba(229, 182, 92, .07);
  --input: rgba(1, 18, 13, .58);
}

body[data-theme="morning"] {
  --bg: #f5f0e3;
  --bg-deep: #ece4d4;
  --surface: rgba(255, 252, 243, .94);
  --surface-solid: #fffaf0;
  --surface-2: #f0eadb;
  --surface-3: rgba(33, 77, 61, .055);
  --surface-soft: rgba(86, 132, 111, .13);
  --text: #18362b;
  --text-soft: #315648;
  --muted: #6d8579;
  --accent: #b98231;
  --accent-strong: #d39a43;
  --accent-ink: #fffaf0;
  --green: #419b65;
  --green-strong: #2f8052;
  --danger: #bd5252;
  --warning: #b77427;
  --border: rgba(117, 87, 39, .20);
  --border-soft: rgba(117, 87, 39, .10);
  --shadow: 0 18px 42px rgba(55, 43, 24, .13);
  --shadow-soft: 0 8px 22px rgba(55, 43, 24, .09);
  --hero-glow: rgba(185, 130, 49, .15);
  --pattern: rgba(48, 94, 73, .06);
  --input: rgba(255, 255, 255, .76);
}

body[data-theme="emerald"] {
  --bg: #063c31;
  --bg-deep: #042c24;
  --surface: rgba(8, 78, 61, .91);
  --surface-solid: #07503e;
  --surface-2: #09634d;
  --surface-3: rgba(255, 255, 255, .055);
  --surface-soft: rgba(255, 218, 141, .10);
  --text: #fff8e7;
  --text-soft: #e5f3eb;
  --muted: #b5d3c5;
  --accent: #f0c772;
  --accent-strong: #ffda89;
  --accent-ink: #15352a;
  --green: #8be2a3;
  --green-strong: #60ca80;
  --danger: #ff8a8a;
  --warning: #ffbf63;
  --border: rgba(240, 199, 114, .28);
  --border-soft: rgba(240, 199, 114, .14);
  --shadow: 0 20px 52px rgba(0, 31, 23, .30);
  --shadow-soft: 0 10px 25px rgba(0, 31, 23, .20);
  --hero-glow: rgba(240, 199, 114, .22);
  --pattern: rgba(240, 199, 114, .08);
  --input: rgba(3, 49, 38, .58);
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  min-height: 100vh;
  color: var(--text);
  background:
    radial-gradient(circle at 82% -8%, var(--hero-glow), transparent 30%),
    radial-gradient(circle at 5% 80%, color-mix(in srgb, var(--green) 8%, transparent), transparent 34%),
    var(--bg);
  font-family: var(--font-arabic);
  line-height: 1.55;
  transition: background .35s ease, color .35s ease;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  opacity: .55;
  background-image:
    linear-gradient(30deg, var(--pattern) 12%, transparent 12.5%, transparent 87%, var(--pattern) 87.5%, var(--pattern)),
    linear-gradient(150deg, var(--pattern) 12%, transparent 12.5%, transparent 87%, var(--pattern) 87.5%, var(--pattern));
  background-size: 92px 160px;
}
button, input, select, textarea { font: inherit; color: inherit; }
button { -webkit-tap-highlight-color: transparent; }
button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, a:focus-visible {
  outline: 3px solid color-mix(in srgb, var(--accent) 55%, transparent);
  outline-offset: 2px;
}
a { color: inherit; }
[hidden] { display: none !important; }
img { max-width: 100%; }
.skip-link { position: fixed; top: 8px; right: 8px; z-index: 10000; padding: 9px 14px; transform: translateY(-150%); border-radius: 10px; background: var(--accent); color: var(--accent-ink); font-weight: 800; }
.skip-link:focus { transform: translateY(0); }
.mobile-only { display: none !important; }

/* Splash + onboarding */
.splash {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: grid;
  place-content: center;
  justify-items: center;
  gap: 8px;
  background: #03130f;
  transition: opacity .45s ease, visibility .45s ease;
}
.splash.is-hidden { opacity: 0; visibility: hidden; }
.splash img { width: 94px; border-radius: 24px; filter: drop-shadow(0 18px 30px rgba(0,0,0,.35)); }
.splash strong { color: #f2c66d; font-size: 2.15rem; }
.splash span { color: #b5cbbf; }
.overlay {
  position: fixed;
  inset: 0;
  z-index: 9000;
  display: grid;
  place-items: center;
  padding: 22px;
  overflow: auto;
  background: rgba(1, 12, 9, .86);
  backdrop-filter: blur(18px);
}
.onboarding-shell {
  width: min(960px, 100%);
  min-height: 570px;
  display: grid;
  grid-template-columns: 1.05fr .95fr;
  overflow: hidden;
  border: 1px solid rgba(229, 182, 92, .25);
  border-radius: 30px;
  background: #061b15;
  box-shadow: 0 40px 100px rgba(0,0,0,.48);
}
.onboarding-art {
  position: relative;
  min-height: 570px;
  padding: 42px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  overflow: hidden;
  background:
    linear-gradient(0deg, rgba(1,14,10,.82), rgba(1,14,10,.08)),
    radial-gradient(circle at 54% 30%, rgba(238,193,103,.25), transparent 24%),
    linear-gradient(145deg, #0a4b39, #03140f);
}
.onboarding-art::before { content: ""; position: absolute; inset: 0; opacity: .35; background: repeating-radial-gradient(circle at 15% 22%, rgba(239,197,111,.14) 0 1px, transparent 2px 24px); }
.onboarding-art::after { content: "☾  🕌"; position: absolute; right: 40px; bottom: 105px; font-size: 7rem; opacity: .25; filter: drop-shadow(0 24px 30px #000); }
.onboarding-art img { position: absolute; top: 40px; right: 40px; width: 95px; border-radius: 24px; }
.art-copy { position: relative; z-index: 1; }
.art-copy span { display: block; color: #f4cc7b; font-size: 2rem; font-weight: 900; }
.art-copy strong { display: block; margin-top: 8px; color: #dae8e0; font-weight: 500; }
.onboarding-content { display: grid; align-content: center; padding: 46px; color: #f6f0df; }
.onboarding-content h1 { margin: 7px 0 8px; color: #f4cc7b; font-size: clamp(1.9rem, 4vw, 2.45rem); }
.onboarding-content p { margin: 0 0 18px; color: #a9c2b7; line-height: 1.8; }
.auth-grid { display: grid; gap: 11px; }
.auth-option, .special-name-option {
  width: 100%;
  display: grid;
  grid-template-columns: 48px 1fr;
  gap: 12px;
  align-items: center;
  padding: 13px;
  text-align: right;
  border: 1px solid rgba(229,182,92,.18);
  border-radius: 15px;
  background: rgba(255,255,255,.025);
  cursor: pointer;
  transition: var(--transition);
}
.auth-option:hover, .special-name-option:hover { transform: translateY(-2px); border-color: #e5b65c; background: rgba(229,182,92,.08); }
.auth-option .auth-mark { width: 46px; height: 46px; display: grid; place-items: center; border-radius: 14px; color: #10251d; background: #e5b65c; font-weight: 900; }
.auth-option strong, .auth-option small { display: block; }
.auth-option small { color: #9fb8ac; margin-top: 3px; }
.special-list { max-height: 320px; display: grid; gap: 9px; overflow: auto; margin-bottom: 12px; }
.status-message { margin: 10px 0; padding: 10px 12px; border: 1px solid rgba(229,182,92,.22); border-radius: 12px; color: #f2ca78; background: rgba(229,182,92,.07); }

/* App shell */
.desktop-sidebar {
  position: fixed;
  z-index: 1200;
  top: 14px;
  right: 14px;
  bottom: 14px;
  width: var(--sidebar-width);
  display: flex;
  flex-direction: column;
  padding: 15px 13px;
  overflow: hidden;
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  background: color-mix(in srgb, var(--surface-solid) 95%, transparent);
  backdrop-filter: blur(20px);
  box-shadow: var(--shadow);
}
.brand-row { display: flex; align-items: center; gap: 11px; padding: 4px 5px 14px; border-bottom: 1px solid var(--border-soft); }
.brand-row img { width: 52px; height: 52px; border-radius: 16px; box-shadow: 0 0 22px var(--hero-glow); }
.brand-row strong, .brand-row small { display: block; }
.brand-row strong { color: var(--accent-strong); font-size: 1.32rem; }
.brand-row small { color: var(--muted); font-size: .75rem; }
.sidebar-user { display: grid; grid-template-columns: 42px 1fr; gap: 10px; align-items: center; margin: 13px 1px 9px; padding: 9px; border: 1px solid var(--border-soft); border-radius: 14px; background: var(--surface-3); }
.sidebar-user img { width: 42px; height: 42px; object-fit: cover; border: 1px solid var(--border); border-radius: 50%; }
.sidebar-user strong, .sidebar-user small { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-user small { color: var(--muted); font-size: .75rem; margin-top: 2px; }
.sidebar-nav { display: flex; flex-direction: column; gap: 4px; overflow-y: auto; padding: 2px 0 8px; scrollbar-width: thin; }
.nav-item {
  min-height: 43px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 11px;
  text-align: right;
  border: 1px solid transparent;
  border-radius: 12px;
  color: var(--text-soft);
  background: transparent;
  cursor: pointer;
  transition: var(--transition);
}
.nav-item .nav-icon { width: 25px; color: var(--accent); text-align: center; font-size: 1.16rem; }
.nav-item:hover { transform: translateX(-2px); background: var(--surface-3); }
.nav-item.is-active { color: var(--text); border-color: var(--border); background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 17%, transparent), color-mix(in srgb, var(--accent) 4%, transparent)); box-shadow: inset 3px 0 var(--accent); }
.nav-count { min-width: 21px; height: 21px; margin-right: auto; display: grid; place-items: center; padding: 0 5px; border-radius: 999px; color: var(--accent-ink); background: var(--accent); font-size: .68rem; font-weight: 900; }
.sidebar-profile { margin-top: auto; padding-top: 10px; border-top: 1px solid var(--border-soft); }
.sidebar-profile button { width: 100%; display: grid; grid-template-columns: 38px 1fr; gap: 10px; align-items: center; padding: 9px; text-align: right; border: 1px solid var(--border); border-radius: 14px; background: var(--surface-3); cursor: pointer; }
.sidebar-profile .profile-ring { width: 38px; height: 38px; display: grid; place-items: center; border: 1px solid var(--accent); border-radius: 50%; color: var(--accent); }
.sidebar-profile strong, .sidebar-profile small { display: block; }
.sidebar-profile small { color: var(--muted); font-size: .73rem; }

.topbar {
  position: sticky;
  top: 13px;
  z-index: 1100;
  height: var(--topbar-height);
  margin: 13px calc(var(--sidebar-width) + 43px) 0 16px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  border: 1px solid var(--border);
  border-radius: 19px;
  background: color-mix(in srgb, var(--surface) 92%, transparent);
  backdrop-filter: blur(19px);
  box-shadow: var(--shadow-soft);
}
.location-chip, .user-chip, .icon-button {
  border: 1px solid var(--border);
  background: var(--surface-3);
  cursor: pointer;
  transition: var(--transition);
}
.location-chip { min-height: 44px; display: inline-flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: 13px; }
.location-chip .ui-icon { color: var(--green); font-size: 1.18rem; }
.location-chip small { color: var(--accent); }
.top-actions { display: flex; align-items: center; gap: 7px; }
.icon-button { width: 43px; height: 43px; display: inline-grid; place-items: center; border-radius: 13px; }
.icon-button:hover { transform: translateY(-2px); background: color-mix(in srgb, var(--accent) 11%, var(--surface-3)); }
.icon-lines, .icon-lines::before, .icon-lines::after { width: 19px; height: 2px; display: block; border-radius: 2px; background: currentColor; }
.icon-lines { position: relative; }
.icon-lines::before, .icon-lines::after { content: ""; position: absolute; right: 0; }
.icon-lines::before { top: -6px; }
.icon-lines::after { top: 6px; }
.notification-button { position: relative; font-size: 1.25rem; }
.notification-button span { position: absolute; top: -5px; left: -5px; min-width: 20px; height: 20px; display: grid; place-items: center; border-radius: 999px; color: var(--accent-ink); background: var(--accent); font-size: .67rem; font-weight: 900; }
.user-chip { min-width: 180px; display: grid; grid-template-columns: 38px 1fr; gap: 8px; align-items: center; padding: 4px 7px; text-align: right; border-radius: 13px; }
.user-chip img { width: 38px; height: 38px; object-fit: cover; border-radius: 50%; }
.user-chip strong, .user-chip small { display: block; }
.user-chip small { color: var(--muted); font-size: .72rem; }
.theme-switcher { position: relative; }
.theme-menu { position: absolute; top: calc(100% + 9px); left: 0; width: 238px; padding: 7px; border: 1px solid var(--border); border-radius: 15px; background: var(--surface-solid); box-shadow: var(--shadow); }
.theme-option { width: 100%; display: grid; grid-template-columns: 36px 1fr; grid-template-rows: auto auto; column-gap: 9px; padding: 8px; text-align: right; border: 0; border-radius: 11px; background: transparent; cursor: pointer; }
.theme-option:hover, .theme-option.is-active { background: var(--surface-3); }
.theme-swatch { grid-row: span 2; width: 34px; height: 34px; border: 2px solid rgba(255,255,255,.28); border-radius: 50%; }
.theme-swatch.night { background: linear-gradient(135deg,#041a14,#e5b65c); }
.theme-swatch.morning { background: linear-gradient(135deg,#fff9eb,#698f7d); }
.theme-swatch.emerald { background: linear-gradient(135deg,#08705a,#f0c772); }
.theme-option small { color: var(--muted); }

.main-content { min-height: calc(100vh - 110px); margin: 17px calc(var(--sidebar-width) + 43px) 50px 16px; }
.page { animation: page-enter .25s ease; }
@keyframes page-enter { from { opacity: 0; transform: translateY(7px); } }

/* Common components */
.eyebrow { color: var(--accent); font-size: .78rem; font-weight: 900; }
h1, h2, h3, p { overflow-wrap: anywhere; }
h1 { margin: 6px 0 8px; font-size: clamp(2rem, 4vw, 3.25rem); line-height: 1.13; }
h2 { margin: 0; font-size: clamp(1.15rem, 2vw, 1.48rem); }
h3 { margin: 0; font-size: 1rem; }
.muted { color: var(--muted); }
.subtle { color: var(--text-soft); }
.gold { color: var(--accent-strong); }
.green { color: var(--green); }
.danger { color: var(--danger); }
.full { width: 100%; }
.center { text-align: center; }
.stack { display: grid; gap: 10px; }
.row { display: flex; align-items: center; gap: 10px; }
.row-between { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.wrap { flex-wrap: wrap; }

.primary-button, .secondary-button, .ghost-button, .danger-button, .link-button, .small-button {
  border-radius: 12px;
  cursor: pointer;
  transition: var(--transition);
}
.primary-button { padding: 10px 16px; border: 1px solid var(--accent); color: var(--accent-ink); background: linear-gradient(135deg, var(--accent-strong), var(--accent)); font-weight: 900; box-shadow: 0 8px 19px color-mix(in srgb, var(--accent) 18%, transparent); }
.secondary-button { padding: 10px 16px; border: 1px solid var(--border); color: var(--text); background: color-mix(in srgb, var(--accent) 8%, var(--surface-3)); font-weight: 800; }
.ghost-button { padding: 10px 15px; border: 1px solid var(--border-soft); color: var(--text-soft); background: transparent; }
.danger-button { padding: 10px 15px; border: 1px solid color-mix(in srgb, var(--danger) 40%, transparent); color: var(--danger); background: color-mix(in srgb, var(--danger) 8%, transparent); }
.link-button { padding: 0; border: 0; color: var(--accent); background: transparent; font-weight: 800; }
.small-button { padding: 7px 10px; border: 1px solid var(--border); background: var(--surface-3); }
.primary-button:hover, .secondary-button:hover, .ghost-button:hover, .danger-button:hover, .small-button:hover { transform: translateY(-2px); }
.button-group { display: flex; flex-wrap: wrap; gap: 8px; }

.field { display: grid; gap: 6px; }
.field label { color: var(--text-soft); font-size: .82rem; font-weight: 700; }
.text-input, .select-input, .number-input, .search-input, textarea {
  width: 100%;
  min-height: 44px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  background: var(--input);
}
textarea { min-height: 110px; resize: vertical; }
select option { background: var(--surface-solid); color: var(--text); }
.search-wrap { position: relative; }
.search-wrap::after { content: "⌕"; position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--accent); font-size: 1.3rem; }
.search-input { padding-left: 42px; }

.panel, .hero-card, .page-hero, .metric-card, .feature-card, .list-card, .setting-card {
  border: 1px solid var(--border);
  background: linear-gradient(145deg, color-mix(in srgb, var(--surface) 97%, transparent), color-mix(in srgb, var(--surface-solid) 94%, transparent));
  box-shadow: var(--shadow-soft);
}
.panel { padding: 18px; border-radius: var(--radius-lg); }
.panel-title { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
.panel-title p { margin: 4px 0 0; color: var(--muted); font-size: .82rem; }
.panel-icon { width: 42px; height: 42px; display: grid; place-items: center; flex: 0 0 auto; border: 1px solid var(--border); border-radius: 13px; color: var(--accent); background: var(--surface-3); font-size: 1.25rem; }
.ornament { position: relative; overflow: hidden; }
.ornament::before, .ornament::after { content: ""; position: absolute; width: 155px; height: 155px; opacity: .55; pointer-events: none; background: repeating-radial-gradient(circle, var(--pattern) 0 1px, transparent 2px 13px); }
.ornament::before { top: -72px; right: -72px; }
.ornament::after { bottom: -78px; left: -78px; }

.page-hero {
  position: relative;
  min-height: 235px;
  display: grid;
  grid-template-columns: minmax(0, 1.25fr) minmax(250px, .75fr);
  gap: 20px;
  align-items: center;
  padding: 26px;
  overflow: hidden;
  border-radius: var(--radius-xl);
}
.page-hero p { max-width: 680px; margin: 0; color: var(--muted); line-height: 1.8; }
.hero-actions { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 18px; }
.hero-art { position: relative; min-height: 180px; display: grid; place-items: center; overflow: hidden; border: 1px solid var(--border-soft); border-radius: 22px; background: radial-gradient(circle at 50% 45%, var(--hero-glow), transparent 42%), linear-gradient(145deg, var(--surface-2), var(--bg-deep)); }
.hero-art::before { content: ""; position: absolute; inset: 0; opacity: .35; background-image: repeating-radial-gradient(circle at 20% 20%, var(--pattern) 0 1px, transparent 2px 20px); }
.hero-art .art-symbol { position: relative; z-index: 1; font-size: clamp(5rem, 10vw, 8rem); filter: drop-shadow(0 25px 25px rgba(0,0,0,.30)); }
.hero-art .art-caption { position: absolute; z-index: 2; right: 15px; bottom: 12px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 999px; color: var(--text-soft); background: color-mix(in srgb, var(--surface-solid) 85%, transparent); font-size: .74rem; }

.dashboard-grid { display: grid; gap: 13px; margin-top: 14px; }
.dashboard-grid.four { grid-template-columns: repeat(4, minmax(0, 1fr)); }
.dashboard-grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
.metric-card { min-height: 100px; display: grid; grid-template-columns: 48px 1fr auto; gap: 10px; align-items: center; padding: 14px; border-radius: var(--radius-md); }
.metric-icon { width: 46px; height: 46px; display: grid; place-items: center; border: 1px solid var(--border); border-radius: 14px; color: var(--accent); background: var(--surface-3); font-size: 1.25rem; }
.metric-card small, .metric-card strong { display: block; }
.metric-card small { color: var(--muted); }
.metric-card strong { margin-top: 2px; font-size: 1.2rem; }
.metric-card em { color: var(--green); font-style: normal; font-weight: 900; }

.content-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; margin-top: 14px; }
.span-2 { grid-column: span 2; }
.span-3 { grid-column: span 3; }
.feature-grid { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 9px; }
.feature-card { min-height: 105px; display: grid; place-items: center; align-content: center; gap: 6px; padding: 11px; text-align: center; border-radius: 15px; cursor: pointer; transition: var(--transition); }
.feature-card:hover { transform: translateY(-3px); border-color: var(--accent); }
.feature-card.is-active { border-color: var(--accent); background: linear-gradient(145deg, color-mix(in srgb, var(--accent) 18%, var(--surface)), var(--surface-solid)); }
.feature-card span { color: var(--accent); font-size: 1.55rem; }
.feature-card small { color: var(--muted); font-size: .72rem; }

.progress-track { height: 8px; overflow: hidden; border-radius: 999px; background: color-mix(in srgb, var(--muted) 20%, transparent); }
.progress-track > span { display: block; height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--green-strong), var(--accent)); transition: width .35s ease; }
.progress-circle { --progress: 0; width: 108px; aspect-ratio: 1; display: grid; place-items: center; border-radius: 50%; background: conic-gradient(var(--accent) calc(var(--progress) * 1%), color-mix(in srgb, var(--muted) 19%, transparent) 0); }
.progress-circle::before { content: ""; width: 76%; aspect-ratio: 1; border-radius: 50%; background: var(--surface-solid); }
.progress-circle strong { position: absolute; font-size: 1.35rem; }

.list-stack { display: grid; gap: 8px; }
.list-row { display: grid; grid-template-columns: auto minmax(0,1fr) auto; gap: 11px; align-items: center; padding: 11px 12px; border: 1px solid var(--border-soft); border-radius: 13px; background: var(--surface-3); }
.list-row .row-icon { width: 39px; height: 39px; display: grid; place-items: center; border-radius: 12px; color: var(--accent); background: var(--surface-soft); }
.list-row strong, .list-row small { display: block; }
.list-row small { margin-top: 3px; color: var(--muted); font-size: .76rem; }
.list-row .row-value { color: var(--accent-strong); font-weight: 900; }

.tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 3px; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab-button { flex: 0 0 auto; min-height: 41px; padding: 8px 14px; border: 1px solid var(--border-soft); border-radius: 12px; color: var(--text-soft); background: var(--surface-3); cursor: pointer; }
.tab-button.is-active { color: var(--accent-ink); border-color: var(--accent); background: var(--accent); font-weight: 900; }

.toggle { position: relative; width: 47px; height: 27px; display: inline-block; }
.toggle input { position: absolute; opacity: 0; pointer-events: none; }
.toggle-track { position: absolute; inset: 0; border: 1px solid var(--border); border-radius: 999px; background: color-mix(in srgb, var(--muted) 35%, transparent); cursor: pointer; transition: var(--transition); }
.toggle-track::after { content: ""; position: absolute; top: 3px; right: 3px; width: 19px; height: 19px; border-radius: 50%; background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,.2); transition: var(--transition); }
.toggle input:checked + .toggle-track { background: var(--green-strong); }
.toggle input:checked + .toggle-track::after { transform: translateX(-20px); }

.chart-bars { height: 150px; display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; align-items: end; padding-top: 18px; border-bottom: 1px solid var(--border-soft); }
.chart-column { height: 100%; display: grid; grid-template-rows: 1fr auto; gap: 6px; align-items: end; text-align: center; }
.chart-bar { width: min(30px, 80%); min-height: 5px; justify-self: center; border-radius: 8px 8px 2px 2px; background: linear-gradient(180deg, var(--accent), var(--green-strong)); }
.chart-column small { color: var(--muted); font-size: .69rem; }

/* Home */
.home-hero { display: grid; grid-template-columns: minmax(0, 1.55fr) minmax(250px, .65fr); gap: 14px; }
.home-main-hero { min-height: 265px; display: grid; grid-template-columns: 1.2fr .8fr; gap: 20px; align-items: center; padding: 27px; border-radius: var(--radius-xl); }
.home-main-hero p { color: var(--muted); max-width: 640px; }
.mosque-scene { min-height: 205px; display: grid; place-items: center; border: 1px solid var(--border-soft); border-radius: 22px; background: radial-gradient(circle at 50% 28%, var(--hero-glow), transparent 30%), linear-gradient(155deg, var(--surface-2), var(--bg-deep)); }
.mosque-scene span { font-size: 7rem; filter: drop-shadow(0 24px 24px rgba(0,0,0,.3)); }
.next-prayer-card { min-height: 265px; display: grid; align-content: center; gap: 8px; padding: 23px; border-radius: var(--radius-xl); }
.next-prayer-card .next-name { color: var(--accent); font-size: 1.25rem; }
.big-time { color: var(--text); font-size: clamp(2.7rem, 6vw, 4.6rem); line-height: 1; letter-spacing: .03em; }
.quick-task { display: grid; grid-template-columns: 44px 1fr auto; gap: 10px; align-items: center; padding: 11px; border: 1px solid var(--border-soft); border-radius: 13px; background: var(--surface-3); }
.quick-task button { width: 34px; height: 34px; display: grid; place-items: center; border: 1px solid var(--border); border-radius: 50%; color: var(--green); background: transparent; cursor: pointer; }
.quote-card { min-height: 190px; display: grid; align-content: center; text-align: center; }
.quote-card blockquote { margin: 4px 0; color: var(--text); font-size: 1.25rem; line-height: 2; }

/* Prayer */
.prayer-summary { display: grid; grid-template-columns: 1fr auto; gap: 18px; align-items: center; }
.prayer-countdown { color: var(--accent-strong); font-size: clamp(2.7rem, 6vw, 4.6rem); line-height: 1; }
.prayer-times-grid { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 8px; margin-top: 13px; }
.prayer-time { min-height: 132px; display: grid; place-items: center; align-content: center; gap: 5px; padding: 10px 5px; text-align: center; border: 1px solid var(--border-soft); border-radius: 15px; background: var(--surface-3); }
.prayer-time.is-current, .prayer-time.is-next { border-color: var(--accent); background: linear-gradient(165deg, color-mix(in srgb, var(--accent) 17%, var(--surface)), var(--surface-solid)); box-shadow: inset 0 -3px var(--accent); }
.prayer-time .prayer-icon { color: var(--accent); font-size: 1.7rem; }
.prayer-time strong { font-size: 1.18rem; }
.prayer-time small { color: var(--muted); }
.prayer-checks { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; }
.prayer-check { min-height: 95px; display: grid; place-items: center; gap: 7px; border: 1px solid var(--border-soft); border-radius: 14px; background: var(--surface-3); cursor: pointer; }
.prayer-check.is-done { border-color: color-mix(in srgb, var(--green) 60%, transparent); background: color-mix(in srgb, var(--green) 10%, var(--surface)); }
.check-circle { width: 34px; height: 34px; display: grid; place-items: center; border: 1px solid var(--border); border-radius: 50%; color: var(--muted); }
.prayer-check.is-done .check-circle { color: var(--accent-ink); border-color: var(--green); background: var(--green); }
.qibla-wrap { display: grid; justify-items: center; gap: 10px; }
.compass { position: relative; width: min(240px, 80vw); aspect-ratio: 1; display: grid; place-items: center; border: 2px solid var(--border); border-radius: 50%; background: radial-gradient(circle, var(--surface-2) 0 55%, transparent 56%), repeating-conic-gradient(from 0deg, var(--border-soft) 0 1deg, transparent 1deg 15deg); box-shadow: inset 0 0 35px rgba(0,0,0,.18); }
.compass::before { content: "N"; position: absolute; top: 8px; color: var(--accent); font-weight: 900; }
.compass::after { content: "🕋"; font-size: 3.2rem; filter: drop-shadow(0 10px 12px rgba(0,0,0,.3)); }
.compass-arrow { position: absolute; width: 4px; height: 43%; bottom: 50%; transform-origin: 50% 100%; border-radius: 999px 999px 2px 2px; background: linear-gradient(0deg, transparent 0 18%, var(--accent) 19%); }
.friday-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 9px; }
.friday-item { min-height: 110px; padding: 12px; display: grid; align-content: center; gap: 5px; border: 1px solid var(--border-soft); border-radius: 14px; background: var(--surface-3); }
.friday-item span { color: var(--accent); font-size: 1.4rem; }
.friday-item small { color: var(--muted); }
.setting-row { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 10px; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--border-soft); }
.setting-row:last-child { border-bottom: 0; }
.setting-row strong, .setting-row small { display: block; }
.setting-row small { color: var(--muted); margin-top: 2px; }

/* Azkar */
.azkar-layout { display: grid; grid-template-columns: minmax(0, 1.55fr) minmax(280px, .65fr); gap: 14px; margin-top: 14px; }
.azkar-item { position: relative; display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 13px; padding: 15px; border: 1px solid var(--border-soft); border-radius: 15px; background: var(--surface-3); }
.azkar-item.is-complete { border-color: color-mix(in srgb, var(--green) 55%, transparent); background: color-mix(in srgb, var(--green) 8%, var(--surface)); }
.azkar-text { font-size: 1.08rem; line-height: 2; }
.azkar-source { margin-top: 7px; color: var(--muted); font-size: .74rem; }
.azkar-controls { min-width: 90px; display: grid; justify-items: center; align-content: center; gap: 7px; }
.counter-button { width: 62px; height: 62px; display: grid; place-items: center; border: 2px solid var(--accent); border-radius: 50%; color: var(--accent-strong); background: color-mix(in srgb, var(--accent) 7%, transparent); font-size: 1.3rem; font-weight: 900; cursor: pointer; }
.counter-button:active { transform: scale(.95); }
.favorite-button { border: 0; color: var(--muted); background: transparent; cursor: pointer; font-size: 1.25rem; }
.favorite-button.is-active { color: var(--accent); }
.tasbih-display { min-height: 180px; display: grid; place-items: center; align-content: center; gap: 8px; border: 1px solid var(--border-soft); border-radius: 18px; background: radial-gradient(circle, var(--surface-soft), transparent 66%); cursor: pointer; user-select: none; }
.tasbih-display strong { color: var(--accent-strong); font-size: 3.4rem; }
.tasbih-display small { color: var(--muted); }

/* Quran */
.quran-hero .hero-art .art-symbol { font-size: 7rem; }
.quran-layout { display: grid; grid-template-columns: minmax(0, 1.55fr) minmax(290px, .65fr); gap: 14px; margin-top: 14px; }
.quran-tools { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 8px; margin-top: 12px; }
.quran-tool { min-height: 84px; display: grid; place-items: center; gap: 3px; padding: 8px; text-align: center; border: 1px solid var(--border-soft); border-radius: 14px; background: var(--surface-3); cursor: pointer; }
.quran-tool span { color: var(--accent); font-size: 1.35rem; }
.quran-tool.is-active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, var(--surface)); }
.reader-toolbar { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
.quran-reader { min-height: 500px; padding: 26px 28px; overflow-y: auto; border: 9px double color-mix(in srgb, var(--accent) 52%, var(--surface)); border-radius: 15px; color: #2b2418; background: #f5ecd3; font-family: "Traditional Arabic", "Amiri", serif; font-size: calc(1.65rem * var(--quran-scale, 1)); line-height: 2.25; text-align: justify; box-shadow: inset 0 0 42px rgba(111, 75, 25, .13); }
.quran-reader .surah-heading { margin-bottom: 16px; text-align: center; color: #725020; font-size: 1.35em; }
.quran-reader .ayah { cursor: pointer; border-radius: 6px; transition: var(--transition); }
.quran-reader .ayah:hover, .quran-reader .ayah.is-selected { background: rgba(177, 126, 48, .14); }
.quran-reader .ayah-number { display: inline-grid; place-items: center; min-width: 28px; height: 28px; margin: 0 4px; border: 1px solid #a98346; border-radius: 50%; font-size: .62em; }
.audio-bar { display: grid; grid-template-columns: 46px 1fr auto; gap: 10px; align-items: center; margin-top: 10px; padding: 10px; border: 1px solid var(--border-soft); border-radius: 13px; background: var(--surface-3); }
.audio-play { width: 43px; height: 43px; border: 1px solid var(--accent); border-radius: 50%; color: var(--accent-ink); background: var(--accent); cursor: pointer; }
.surah-list { max-height: 505px; overflow-y: auto; display: grid; gap: 7px; scrollbar-width: thin; }
.surah-row { display: grid; grid-template-columns: 36px 1fr auto; gap: 9px; align-items: center; padding: 9px; border: 1px solid var(--border-soft); border-radius: 12px; background: var(--surface-3); cursor: pointer; }
.surah-row.is-active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, var(--surface)); }
.surah-number { width: 34px; height: 34px; display: grid; place-items: center; border: 1px solid var(--border); border-radius: 10px; color: var(--accent); }
.surah-row strong, .surah-row small { display: block; }
.surah-row small { color: var(--muted); font-size: .7rem; }
.plan-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
.plan-card { min-height: 115px; padding: 11px; display: grid; align-content: center; gap: 4px; text-align: center; border: 1px solid var(--border-soft); border-radius: 14px; background: var(--surface-3); cursor: pointer; }
.plan-card.is-active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 11%, var(--surface)); }
.plan-card strong { color: var(--accent-strong); }
.plan-card small { color: var(--muted); }

/* Wird */
.wird-layout { display: grid; grid-template-columns: minmax(250px, .65fr) minmax(0, 1.5fr) minmax(250px, .65fr); gap: 14px; margin-top: 14px; }
.wird-task { display: grid; grid-template-columns: 48px minmax(0,1fr) 76px 34px; gap: 10px; align-items: center; padding: 11px; border: 1px solid var(--border-soft); border-radius: 13px; background: var(--surface-3); }
.wird-task .task-icon { width: 45px; height: 45px; display: grid; place-items: center; border: 1px solid var(--border); border-radius: 13px; color: var(--accent); font-size: 1.3rem; }
.wird-task strong, .wird-task small { display: block; }
.wird-task small { color: var(--muted); font-size: .72rem; }
.task-controls { display: flex; align-items: center; gap: 5px; }
.task-controls button { width: 29px; height: 29px; display: grid; place-items: center; border: 1px solid var(--border); border-radius: 9px; background: transparent; cursor: pointer; }
.task-progress { color: var(--green); font-weight: 900; font-size: .78rem; text-align: center; }
.streak-card { text-align: center; }
.streak-number { color: var(--accent-strong); font-size: 3rem; line-height: 1; }

/* Achievements */
.badge-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
.badge-card { min-height: 155px; display: grid; place-items: center; align-content: center; gap: 7px; padding: 12px; text-align: center; border: 1px solid var(--border-soft); border-radius: 15px; background: var(--surface-3); }
.badge-card.is-locked { filter: grayscale(.8); opacity: .58; }
.badge-medal { width: 61px; height: 61px; display: grid; place-items: center; border: 2px solid var(--accent); border-radius: 50%; color: var(--accent); background: var(--surface-soft); font-size: 1.65rem; }
.badge-card small { color: var(--muted); }
.breakdown-list { display: grid; gap: 12px; }
.breakdown-row { display: grid; grid-template-columns: 100px 1fr 45px; gap: 10px; align-items: center; }
.breakdown-row b { color: var(--green); text-align: left; }

/* Notifications */
.notification-list { display: grid; gap: 9px; }
.notification-card { display: grid; grid-template-columns: 46px minmax(0,1fr) auto; gap: 11px; align-items: start; padding: 12px; border: 1px solid var(--border-soft); border-radius: 14px; background: var(--surface-3); }
.notification-card.is-unread { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 7%, var(--surface)); }
.notification-symbol { width: 44px; height: 44px; display: grid; place-items: center; border-radius: 13px; color: var(--accent); background: var(--surface-soft); font-size: 1.25rem; }
.notification-card p { margin: 3px 0; color: var(--muted); }
.notification-card time { color: var(--muted); font-size: .72rem; }
.notification-card .dot { width: 9px; height: 9px; margin-top: 7px; border-radius: 50%; background: var(--accent); }

/* Articles */
.articles-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 13px; }
.article-card { overflow: hidden; border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--surface); box-shadow: var(--shadow-soft); transition: var(--transition); }
.article-card:hover { transform: translateY(-4px); border-color: var(--accent); }
.article-cover { min-height: 155px; display: grid; place-items: center; font-size: 4.6rem; background: radial-gradient(circle, var(--hero-glow), transparent 52%), linear-gradient(145deg, var(--surface-2), var(--bg-deep)); }
.article-body { padding: 15px; }
.article-meta { display: flex; justify-content: space-between; gap: 8px; color: var(--muted); font-size: .74rem; }
.article-card h3 { margin: 9px 0 6px; font-size: 1.12rem; }
.article-card p { margin: 0; color: var(--muted); line-height: 1.75; }
.article-card button { margin-top: 12px; }

/* Settings + Profile */
.settings-layout { display: grid; grid-template-columns: minmax(240px, .65fr) minmax(0, 1.35fr); gap: 14px; margin-top: 14px; }
.settings-menu { display: grid; gap: 6px; align-content: start; }
.settings-menu button { min-height: 44px; padding: 9px 12px; text-align: right; border: 1px solid transparent; border-radius: 12px; background: transparent; cursor: pointer; }
.settings-menu button.is-active { border-color: var(--border); color: var(--accent); background: var(--surface-3); }
.theme-card-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 9px; }
.theme-card { padding: 7px; border: 1px solid var(--border-soft); border-radius: 14px; background: var(--surface-3); cursor: pointer; }
.theme-card.is-active { border-color: var(--accent); }
.theme-preview { height: 75px; border-radius: 10px; }
.theme-preview.night { background: linear-gradient(135deg,#03140f 0 60%,#e5b65c 61%); }
.theme-preview.morning { background: linear-gradient(135deg,#fff8e8 0 60%,#668d7a 61%); }
.theme-preview.emerald { background: linear-gradient(135deg,#07604c 0 60%,#f0c772 61%); }
.theme-card b { display: block; padding: 7px 4px 3px; }
.profile-hero { display: grid; grid-template-columns: 105px 1fr auto; gap: 18px; align-items: center; padding: 22px; border: 1px solid var(--border); border-radius: var(--radius-xl); background: var(--surface); box-shadow: var(--shadow-soft); }
.profile-hero img { width: 104px; height: 104px; object-fit: cover; border: 2px solid var(--accent); border-radius: 26px; }
.profile-hero h1 { font-size: 2rem; }
.profile-hero p { margin: 4px 0 0; color: var(--muted); }

/* Modal, drawer, toast */
.modal-backdrop { position: fixed; inset: 0; z-index: 5000; display: grid; place-items: center; padding: 18px; background: rgba(0,0,0,.62); backdrop-filter: blur(10px); }
.modal-card { position: relative; width: min(650px, 100%); max-height: min(86vh, 820px); overflow-y: auto; padding: 24px; border: 1px solid var(--border); border-radius: 22px; background: var(--surface-solid); box-shadow: var(--shadow); }
.modal-close { position: sticky; z-index: 2; top: 0; float: left; width: 37px; height: 37px; border: 1px solid var(--border); border-radius: 11px; background: var(--surface-3); cursor: pointer; font-size: 1.4rem; }
.modal-card h2 { margin: 6px 0 14px; color: var(--accent-strong); }
.modal-card p { line-height: 1.85; }
.drawer-backdrop { position: fixed; inset: 0; z-index: 3000; background: rgba(0,0,0,.58); backdrop-filter: blur(6px); }
.mobile-drawer { position: fixed; z-index: 3100; top: 0; right: 0; bottom: 0; width: min(330px, 87vw); padding: 18px; overflow-y: auto; transform: translateX(105%); border-left: 1px solid var(--border); background: var(--surface-solid); box-shadow: var(--shadow); transition: transform .28s ease; }
.mobile-drawer.is-open { transform: translateX(0); }
.drawer-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
.drawer-head img { width: 48px; border-radius: 14px; }
.drawer-nav { display: grid; gap: 6px; }
.drawer-nav .nav-item { width: 100%; }
.toast-region { position: fixed; z-index: 7000; left: 16px; bottom: 16px; display: grid; gap: 8px; }
.toast { min-width: 260px; max-width: min(390px, calc(100vw - 32px)); padding: 11px 14px; border: 1px solid var(--border); border-radius: 13px; color: var(--text); background: var(--surface-solid); box-shadow: var(--shadow); animation: toast-in .25s ease; }
.toast.success { border-color: color-mix(in srgb, var(--green) 55%, transparent); }
.toast.error { border-color: color-mix(in srgb, var(--danger) 55%, transparent); }
@keyframes toast-in { from { opacity: 0; transform: translateY(8px); } }

/* Empty/loading */
.loading-box, .empty-state { min-height: 180px; display: grid; place-items: center; align-content: center; gap: 8px; text-align: center; color: var(--muted); }
.spinner { width: 35px; height: 35px; border: 3px solid var(--border-soft); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Responsive */

  .content-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }

@media (max-width: 800px) {

@media (max-width: 520px) {

/* ======================= مُعيني 11 — إعادة التنظيم ======================= */
:root{--slide:cubic-bezier(.2,.8,.2,1)}

.watermark-empty{position:relative;min-height:370px;display:grid;place-items:center;overflow:hidden;border:1px dashed var(--border-soft);border-radius:24px;background:linear-gradient(145deg,var(--surface-3),transparent)}

.subpage-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}

.mushaf-ayah{position:relative;border-radius:7px;cursor:pointer}
.mushaf-ayah:hover{background:rgba(169,134,76,.16)}
.heart-pop{position:fixed;z-index:9000;pointer-events:none;font-size:3rem;color:#e75d7a;animation:heartPop .8s forwards}
@keyframes heartPop{0%{opacity:0;transform:scale(.2)}35%{opacity:1;transform:scale(1.25)}100%{opacity:0;transform:translateY(-55px) scale(.8)}}
.fullscreen-exit{position:fixed;z-index:10001;top:18px;left:18px;width:48px;height:48px;border:1px solid #c6a866;border-radius:50%;background:#10251d;color:#f5d78f}
.tafsir-search-wrap{position:relative}
.search-suggestions{position:absolute;z-index:30;top:calc(100% + 6px);right:0;left:0;max-height:300px;overflow:auto;padding:6px;border:1px solid var(--border);border-radius:13px;background:var(--surface-solid);box-shadow:var(--shadow)}
.search-suggestions button{width:100%;padding:9px;text-align:right;border:0;border-radius:9px;background:transparent}
.search-suggestions button:hover{background:var(--surface-3)}
.surah-index-v11{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:7px;max-height:480px;overflow:auto}
.surah-index-v11 button{padding:9px;border:1px solid var(--border-soft);border-radius:11px;background:var(--surface-3)}
.tafsir-ayah{padding:16px;border:1px solid var(--border-soft);border-radius:15px;background:var(--surface-3)}
.tafsir-ayah .qtext{font-family:"Traditional Arabic","Amiri",serif;font-size:1.35rem;line-height:2.05}
.tafsir-ayah .ttext{margin-top:10px;padding-top:10px;border-top:1px solid var(--border-soft);color:var(--text-soft);line-height:1.9}
.listen-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:9px}
.reciter-card{padding:12px;border:1px solid var(--border-soft);border-radius:14px;background:var(--surface-3)}
.reciter-card.active{border-color:var(--accent)}
.favorite-card{padding:13px;border:1px solid var(--border-soft);border-radius:14px;background:var(--surface-3)}
.favorite-card .fav-text{font-family:"Traditional Arabic","Amiri",serif;font-size:1.15rem;line-height:1.9}
.wird-launchers{grid-template-columns:repeat(3,minmax(0,1fr))}
.wird-task-v11{display:grid;grid-template-columns:46px 1fr auto auto;gap:9px;align-items:center;padding:10px;border:1px solid var(--border-soft);border-radius:13px;background:var(--surface-3)}
.wird-task-v11 .task-symbol{width:43px;height:43px;display:grid;place-items:center;border:1px solid var(--border);border-radius:12px;color:var(--accent)}
.hifz-transcript{padding:16px;border:1px solid var(--border-soft);border-radius:15px;background:var(--surface-3);font-size:1.2rem;line-height:2}
.word-ok{color:var(--green)}.word-bad{color:var(--danger);text-decoration:underline wavy}
.record-btn{min-width:130px;padding:14px 22px;border:0;border-radius:14px;background:#b32121;color:#fff;font-weight:900}
.record-btn.recording{animation:pulseRed 1s infinite}
@keyframes pulseRed{50%{box-shadow:0 0 0 12px rgba(179,33,33,.18)}}
.settings-icons{grid-template-columns:repeat(auto-fit,minmax(125px,1fr))}
.setting-section{display:grid;gap:10px}
.setting-v11-row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:11px;border-bottom:1px solid var(--border-soft)}
.profile-v11{display:grid;grid-template-columns:130px 1fr;gap:20px;align-items:center}
@media(max-width:800px){
 .prayer-v11-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
 .friday-sunan-grid{grid-template-columns:1fr}
 .mushaf-page{padding:24px 15px;font-size:calc(1.35rem * var(--quran-scale,1));border-width:6px}
 .mushaf-shell{padding:8px;min-height:570px}
 .mushaf-toolbar-corner{top:16px;left:16px}
 .mushaf-controls-drawer{top:10px;left:10px;width:calc(100% - 20px);max-height:calc(100% - 20px)}
 .azkar-v11-item{grid-template-columns:1fr}
 .azkar-v11-count{grid-template-columns:auto auto;justify-content:space-between}
 .wird-launchers{grid-template-columns:1fr 1fr 1fr}
 .profile-v11{grid-template-columns:1fr;text-align:center;justify-items:center}
}
@media(max-width:520px){
 .prayer-v11-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
 .prayer-v11-card:last-child{grid-column:span 2}
 .section-launchers{grid-template-columns:repeat(2,minmax(0,1fr))}
 .wird-launchers{grid-template-columns:1fr}
 .sunnah-row{grid-template-columns:1fr}
 .mushaf-meta{grid-template-columns:repeat(2,1fr)}
}

const AZKAR = {
  morning: {
    title: 'أذكار الصباح', subtitle: 'النص الكامل مع عداد مستقل لكل ذكر', icon: '☀',
    items: [
      { id: "m01", text: "أعُوذُ بِاللهِ السَّمِيعِ العَلِيمِ مِنَ الشَّيْطَانِ الرَّجِيمِ * بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ\n\nالحَمْدُ للهِ رَبِّ العَالَمِينَ * الرَّحْمَنِ الرَّحِيمِ * مَالِكِ يَوْمِ الدِّينِ * إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ * اهْدِنَا الصِّرَاطَ المُسْتَقِيمَ * صِرَاطَ الذَّينَ أَنْعَمْتَ عَلَيْهِمْ * غَيْرِ المَغْضُوبِ عَلَيْهِمْ وَلاَ الضَّالَّين * آمين", target: 1, source: "الفاتحة" },
      { id: "m02", text: "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ\n\nالـم * ذَلِكَ الكِتَابُ لاَ رَيْبَ فِيِهِ هُدَىً لِلْمُتَّقِينَ * الذَّينَ يُؤْمِنُونَ بِالْغَيْبِ وَيُقِيمُونَ الصَّلاةَ وَمِمِّا رَزَقْنَاهُمْ يُنْفِقُونَ * وَالذَّينَ يُؤْمِنُونَ بِمَا أُنْزِلَ إِلَيْكَ وَمَا أُنْزِلَ مِنْ قَبْلِكَ وَبِالآخِرَةِ هُمْ يُوقِنُونَ * أُوْلَئِكَ عَلَى هُدَىً مِّنْ رَّبِّهِمْ وَأُوْلَئِكَ هُمُ المُفْلِحُونَ", target: 1, source: "البقرة: 1–5" },
      { id: "m03", text: "اللهُ لاَ إِلَهَ إِلاَّ هُوَ الحَيُّ القَيُّومُ لاَ تَأْخُذُهُ سِنَةٌ وَلاَ نَوْمٌ لَهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الأَرْضِ مَنْ ذَا الذَّي يَشْفَعُ عِنْدَهُ إِلاَّ بِإِذْنِهِ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ وَلاَ يُحِيطُونَ بِشَيْءٍ مِنْ عِلْمِهِ إِلاَّ بِمَا شَاءَ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالأَرْضَ وَلاَ يَؤُودُهُ حِفْظُهُمَا وَهُوَ العَلِيُّ العَظِيمُ * لاَ إِكْرَاهَ فِي الدِّينِ قَدْ تَّبَيَّنَ الرُّشْدُ مِنَ الغَيِّ فَمَنْ يَّكْفُرْ بِالطَّاغُوتِ وَيُؤْمِنُ بِاللهِ فَقَدْ اسْتَمْسَكَ بِالعُرْوَةِ الوُثْقَى لاَ انْفِصَامَ لَهَا وَاللهُ سَمِيعٌ عَلِيمٌ * اللهُ وَلِيُّ الذَّينَ آمَنُوا يُخْرِجَهُمْ مِنَ الظُّلُمَاتِ إِلَى النُّورِ وَالذَّينَ كَفَرُوا أَوْلِيَاؤَهُمُ الطَّاغُوتُ يُخْرِجُونَهُمْ مِنَ النُّورِ إِلَى الظُّلُمَاتِ أُوْلَئِكَ أَصْحَابُ النَّارِ هُمْ فِيهَا خَالِدُونَ", target: 1, source: "البقرة: 255–257" },
      { id: "m04", text: "للهِ مَا فِي السَّمَاوَاتِ وَمَا فِي الأَرْضِ وَإِنْ تُبْدُوا مَا فِي أَنْفُسِكُمْ أَوْ تُخْفُوهُ يُحَاسِبْكُمْ بِهِ اللهُ فَيَغْفِرُ لِمَنْ يَّشَاءُ وَيُعَذِّبُ مَنْ يَّشَاءُ وَاللهُ عَلَى كُلِّ شَيْءٍ قَدِيرٌ * آمَنَ الرَّسُولُ بِمَا أُنْزِلَ إِلَيْهِ مِنْ رَّبِّهِ وَالمُؤْمِنُونَ كُلٌّ آمَنَ بِاللهِ وَمَلاَئِكَتِهِ وَكُتُبِهِ وَرُسُلِهِ لاَ نُفَرِّقُ بَيْنَ أَحْدٍ مِنْ رُسُلِهِ وَقَالُوا سَمِعْنَا وَأَطَعْنَا غُفْرَانَكَ رَبَّنَا وَإِلَيْكَ المَصِيرُ * لاَ يُكَلِّفُ اللهُ نَفْسَاً إِلاَّ وُسْعَهَا لَهَا مَا كَسَبَتْ وَعَلَيْهَا مَا اكْتَسَبَتْ رَبَّنَا لاَ تُؤَاخِذْنَا إِنْ نَّسِينَا أَوْ أَخْطَأْنَا رَبَّنَا وَلاَ تَحْمِلْ عَلَيْنَا إِصْرَاً كَمَا حَمَلْتَهُ عَلَى الذَّينَ مِنْ قَبْلِنَا رَبَّنَا وَلاَ تُحَمِّلْنَا مَا لاَ طَاقَةَ لَنَا بِهِ وَاعْفُ عَنَّا وَاغْفِرْ لَنَا وَارْحَمْنَا أَنْتَ مَوْلاَنَا فَانْصُرْنَا عَلَى القَوْمِ الكَافِرِينَ", target: 1, source: "البقرة: 284–286" },
      { id: "m05", text: "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ * قُلْ هُوَ اللهُ أَحَدٌ * اللهُ الصَّمَدُ * لَمْ يَلِدْ وَلَمْ يُولَدْ * وَلَمْ يَكُنْ لَهُ كُفْوَاً أَحَدٌ", target: 3, source: "سورة الإخلاص" },
      { id: "m06", text: "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ * قُلْ أَعُوذُ بِرَبِّ الفَلَقِ * مِنْ شَرِّ مَا خَلَقَ * وَمِنْ شَرِّ غَاسِقٍ إِذَا وَقَبَ * وَمِنْ شَرِّ النَّفَّاثَاتِ فِي العُقَدِ * وَمِنْ شَرِّ حَاسِدٍ إِذَا حَسَدَ", target: 3, source: "سورة الفلق" },
      { id: "m07", text: "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ * قُلْ أَعُوذُ بِرَبِّ النَّاسِ * مَلِكِ النَّاسِ * إِلَهِ النَّاسِ * مِنْ شَرِّ الوَسْوَاسِ الخَنَّاسِ * الذَّي يُوَسْوِسُ فِي صُدُورِ النَّاسِ * مِنَ الجِنَّةِ وَالنَّاسِ", target: 3, source: "سورة الناس" },
      { id: "m08", text: "أصبحنا (أمسينا) وأصبح (وأمسى) الملك لله، والحمد لله، لا شريك له، لا إله إلا هو وإليه النشور.", target: 3, source: "ذكر الصباح والمساء" },
      { id: "m09", text: "أصبحنا (أمسينا) على فطرة الإسلام وكلمة الإخلاص، وعلى دين نبينا محمد صلى الله عليه وسلم، وعلى ملة أبينا إبراهيم حنيفاً وما كان من المشركين.", target: 3, source: "ذكر الصباح والمساء" },
      { id: "m10", text: "اللهم إني أصبحت (أمسيت) منك في نعمة وعافية وستر، فأتمم نعمتك عليَّ وعافيتك وسترك في الدنيا والآخرة.", target: 3, source: "دعاء" },
      { id: "m11", text: "اللهم ما أصبح (أمسى) بي من نعمة أو بأحدٍ من خلقك فمنك وحدك لا شريك لك، فلك الحمد ولك الشكر.", target: 3, source: "دعاء" },
      { id: "m12", text: "يا ربي لك الحمد كما ينبغي لجلال وجهك وعظيم سلطانك.", target: 3, source: "ثناء" },
      { id: "m13", text: "رضيت بالله رباً، وبالإسلام ديناً، وبسيدنا محمد صلى الله عليه وسلم رسولاً ونبياً.", target: 3, source: "ذكر" },
      { id: "m14", text: "سبحان الله وبحمده، عدد خلقه، ورضا نفسه، وزنة عرشه، ومداد كلماته.", target: 3, source: "ذكر" },
      { id: "m15", text: "اللهم إنا نعوذ بك من أن نشرك بك شيئاً نعلمه، ونستغفرك لما لا نعلمه.", target: 3, source: "دعاء" },
      { id: "m16", text: "أعوذ بكلمات الله التامات من شر ما خلق.", target: 3, source: "ذكر" },
      { id: "m17", text: "اللهم إني أعوذ بك من الهم والحزن، وأعوذ بك من العجز والكسل، وأعوذ بك من الجبن والبخل، وأعوذ بك من غلبة الدين وقهر الرجال.", target: 3, source: "دعاء" },
      { id: "m18", text: "اللهم إني أعوذ بك من الكفر والفقر، وأعوذ بك من عذاب القبر، لا إله إلا أنت.", target: 3, source: "دعاء" },
      { id: "m19", text: "اللهم عافني في بدني، اللهم عافني في سمعي، اللهم عافني في بصري، لا إله إلا أنت.", target: 3, source: "دعاء" },
      { id: "m20", text: "اللهم أنت ربي لا إله إلا أنت، خلقتني وأنا عبدك، وأنا على عهدك ووعدك ما استطعت، أعوذ بك من شر ما صنعت، أبوء لك بنعمتك عليَّ وأبوء بذنبي فاغفر لي؛ فإنه لا يغفر الذنوب إلا أنت.", target: 3, source: "سيد الاستغفار" },
      { id: "m21", text: "أستغفر الله الذي لا إله إلا هو الحي القيوم وأتوب إليه.", target: 3, source: "استغفار" },
      { id: "m22", text: "سبحانك اللهم وبحمدك، أشهد أن لا إله إلا أنت، أستغفرك وأتوب إليك.", target: 3, source: "استغفار" },
      { id: "m23", text: "اللهم صل على سيدنا محمد عبدك ونبيك ورسولك النبي الأمي، وعلى آله وصحبه وسلم تسليماً، عدد ما أحاط به علمك وخط به قلمك وأحصاه كتابك، وارض اللهم عن ساداتنا أبي بكر وعمر وعثمان وعلي، وعن الصحابة أجمعين، وعن التابعين وتابعيهم بإحسان إلى يوم الدين.", target: 1, source: "الصلاة على النبي ﷺ" },
      { id: "m24", text: "سبحان ربك رب العزة عما يصفون، وسلام على المرسلين، والحمد لله رب العالمين.", target: 1, source: "خاتمة" },

  ['splash', 'onboarding', 'onboarding-content', 'app', 'desktop-sidebar', 'page-root', 'mobile-bottom-nav', 'top-location', 'top-user', 'theme-menu', 'theme-button', 'notification-badge', 'drawer-backdrop', 'mobile-drawer', 'modal', 'modal-content', 'toast-region', 'audio-player'].forEach(id => {
    els[toCamel(id)] = document.getElementById(id);
  });
}

function toCamel(value) { return value.replace(/-([a-z])/g, (_, char) => char.toUpperCase()); }
function dateKey(date = new Date()) { return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`; }
function clamp(value, min, max) { return Math.min(max, Math.max(min, value)); }
function percent(value, target) { return target <= 0 ? 0 : Math.round(clamp(value / target, 0, 1) * 100); }
function escapeHTML(value = '') { return String(value).replace(/[&<>'"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[char])); }
function deepMerge(defaults, stored) {
  if (!stored || typeof stored !== 'object') return structuredClone(defaults);
  const output = structuredClone(defaults);
  for (const [key, value] of Object.entries(stored)) {
    if (value && typeof value === 'object' && !Array.isArray(value) && output[key] && typeof output[key] === 'object' && !Array.isArray(output[key])) {
      output[key] = deepMerge(output[key], value);
    } else {
      output[key] = value;
    }
  }
  return output;
}
function formatNumber(value) { return new Intl.NumberFormat('ar-EG').format(value); }
function formatDateArabic(date = new Date()) { return new Intl.DateTimeFormat('ar-EG', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }).format(date); }
function formatTime12(time24) {
  const [hourRaw, minute] = time24.split(':').map(Number);
  const suffix = hourRaw >= 12 ? 'م' : 'ص';
  const hour = hourRaw % 12 || 12;
  return `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')} ${suffix}`;
}
function userStorageKey() { return state.user ? `${STORAGE_PREFIX}_data_${state.user.type}_${state.user.id}` : null; }

function resetDailyIfNeeded() {
  const today = dateKey();
  if (state.data.dailyDate === today) return;
  const previousComplete = calculateWirdPercent(state.data) >= 100;
  if (previousComplete) {
    const previous = new Date(`${state.data.dailyDate}T12:00:00`);
    const diffDays = Math.round((new Date(`${today}T12:00:00`) - previous) / 86400000);
    state.data.stats.currentStreak = diffDays === 1 ? state.data.stats.currentStreak + 1 : 1;
    state.data.stats.bestStreak = Math.max(state.data.stats.bestStreak, state.data.stats.currentStreak);
    state.data.stats.lastCompletedWirdDate = state.data.dailyDate;
  } else if (state.data.stats.lastCompletedWirdDate !== state.data.dailyDate) {
    state.data.stats.currentStreak = 0;
  }
  state.data.dailyDate = today;
  state.data.daily = createDefaultData().daily;
  saveData();
}

function loadSession() {
  try {
    const raw = localStorage.getItem(`${STORAGE_PREFIX}_session`);
    if (raw) state.user = JSON.parse(raw);
  } catch { state.user = null; }
}

function loadData() {
  const defaults = createDefaultData();
  if (!state.user || state.user.type === 'guest') {
    state.data = defaults;
    if (state.user?.name) state.data.profile.name = state.user.name;
    return;
  }
  try {
    const raw = localStorage.getItem(userStorageKey());
    state.data = deepMerge(defaults, raw ? JSON.parse(raw) : null);
  } catch {
    state.data = defaults;
  }
  state.data.profile.name = state.user.name || state.data.profile.name;
  state.data.profile.email = state.user.email || state.data.profile.email;
  state.data.profile.avatar = state.user.avatar || state.data.profile.avatar;
  resetDailyIfNeeded();
}

function saveData({ sync = true } = {}) {
  applyTheme(state.data.settings.theme, false);
  if (!state.user || state.user.type === 'guest') return;
  try { localStorage.setItem(userStorageKey(), JSON.stringify(state.data)); } catch (error) { console.warn('تعذر الحفظ المحلي', error); }
  if (sync && state.user.type === 'google') scheduleCloudSync();
}

function setSession(user) {
  state.user = user;
  localStorage.setItem(`${STORAGE_PREFIX}_session`, JSON.stringify(user));
}

async function clearSession() {
  if (state.user?.type === 'google' && state.supabase) {
    try { await state.supabase.auth.signOut(); } catch { /* ignore */ }
  }
  localStorage.removeItem(`${STORAGE_PREFIX}_session`);
  state.user = null;
  state.data = createDefaultData();
  location.hash = '';
  showOnboarding('country');
}

async function sha256(text) {
  const bytes = new TextEncoder().encode(text);
  const digest = await crypto.subtle.digest('SHA-256', bytes);
  return Array.from(new Uint8Array(digest)).map(byte => byte.toString(16).padStart(2, '0')).join('');
}

function getSpecialAccounts() {
  try { return JSON.parse(localStorage.getItem(`${STORAGE_PREFIX}_special_accounts`) || '{}'); } catch { return {}; }
}
function saveSpecialAccounts(accounts) { localStorage.setItem(`${STORAGE_PREFIX}_special_accounts`, JSON.stringify(accounts)); }

async function loadSupabaseLibrary() {
  if (window.supabase) return window.supabase;
  return new Promise(resolve => {
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
    script.async = true;
    script.onload = () => resolve(window.supabase || null);
    script.onerror = () => resolve(null);
    document.head.appendChild(script);
    setTimeout(() => resolve(window.supabase || null), 7000);
  });
}

async function initSupabase() {
  if (!CONFIG.supabaseUrl || !CONFIG.supabaseAnonKey) return null;
  try {
    const library = await loadSupabaseLibrary();
    if (!library) return null;
    state.supabase = library.createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    });
    const { data } = await state.supabase.auth.getSession();
    if (data?.session?.user) await acceptGoogleSession(data.session.user);
    state.supabase.auth.onAuthStateChange(async (_event, session) => {
      if (session?.user) await acceptGoogleSession(session.user);
    });
    return state.supabase;
  } catch (error) {
    console.warn('Supabase غير متاح', error);
    return null;
  }
}

async function loginGoogle() {
  const client = state.supabase || await initSupabase();
  if (!client) {
    toast('تعذر تشغيل تسجيل Google. راجع config.js واتصال الإنترنت.', 'error');
    return;
  }
  localStorage.setItem(`${STORAGE_PREFIX}_country`, state.onboardingCountry);
  const redirectTo = `${location.origin}${location.pathname}`;
  const { error } = await client.auth.signInWithOAuth({ provider: 'google', options: { redirectTo } });
  if (error) toast(error.message || 'تعذر تسجيل الدخول', 'error');
}

  const meta = user.user_metadata || {};

    type: 'google', id: user.id, name: meta.full_name || meta.name || user.email?.split('@')[0] || 'مستخدم Google',
    email: user.email || '', avatar: meta.avatar_url || meta.picture || 'data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20512%20512%22%3E%0A%3Cdefs%3E%3ClinearGradient%20id=%22a%22%20x1=%220%22%20y1=%220%22%20x2=%221%22%20y2=%221%22%3E%3Cstop%20stop-color=%22#0b5b45%22/%3E%3Cstop%20offset=%221%22%20stop-color=%22#03130f%22/%3E%3C/linearGradient%3E%3C/defs%3E%0A%3Crect%20width=%22512%22%20height=%22512%22%20rx=%22128%22%20fill=%22url(#a)%22/%3E%0A%3Ccircle%20cx=%22256%22%20cy=%22196%22%20r=%2282%22%20fill=%22#f8f1df%22/%3E%0A%3Cpath%20d=%22M108%20448c12-98%2073-158%20148-158s136%2060%20148%20158%22%20fill=%22#f8f1df%22/%3E%0A%3Ccircle%20cx=%22256%22%20cy=%22256%22%20r=%22226%22%20fill=%22none%22%20stroke=%22#f0c772%22%20stroke-width=%2214%22%20opacity=%22.9%22/%3E%0A%3C/svg%3E'
  });
  loadData();
  await loadCloudData();
  startApp({ skipLoad: true });
}

function scheduleCloudSync() {
  clearTimeout(state.syncTimer);
  state.syncTimer = setTimeout(syncCloudData, 900);
}

async function syncCloudData() {
  if (!state.supabase || state.user?.type !== 'google') return;
  try {
    const { error } = await state.supabase.from('muaini_user_data').upsert({
      user_id: state.user.id,
      data: state.data,
      updated_at: new Date().toISOString()
    }, { onConflict: 'user_id' });
    if (error) throw error;
  } catch (error) { console.warn('تعذرت المزامنة', error); }
}

async function loadCloudData() {
  if (!state.supabase || state.user?.type !== 'google') return;
  try {
    const { data, error } = await state.supabase.from('muaini_user_data').select('data,updated_at').eq('user_id', state.user.id).maybeSingle();
    if (error) throw error;
    if (data?.data) {
      state.data = deepMerge(createDefaultData(), data.data);
      state.data.profile.name = state.user.name;
      state.data.profile.email = state.user.email;
      state.data.profile.avatar = state.user.avatar;
      saveData({ sync: false });
    }
  } catch (error) { console.warn('تعذر تحميل البيانات السحابية', error); }
}

function selectedCountry() { return COUNTRIES[state.data.settings.country] || COUNTRIES.EG; }

async function fetchPrayerTimes() {
  const locationConfig = selectedCountry();
  const method = state.data.settings.prayerMethod || locationConfig.method;
  const url = `https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(locationConfig.city)}&country=${encodeURIComponent(locationConfig.apiCountry)}&method=${method}`;
  try {
    const response = await fetch(url, { cache: 'no-store' });
    if (!response.ok) throw new Error('Prayer API failed');
    const payload = await response.json();
    const timings = payload?.data?.timings;
    if (!timings) throw new Error('No timings');
    state.prayerTimes = Object.fromEntries(PRAYER_KEYS.map(key => [key, cleanTime(timings[key]) || FALLBACK_TIMES[key]]));
    state.prayerMeta = payload.data;
  } catch (error) {
    state.prayerTimes = { ...FALLBACK_TIMES };
    console.warn('استخدام مواقيت احتياطية', error);
  }
  updatePrayerLiveWidgets();
}

function cleanTime(value) {
  const match = String(value || '').match(/\d{1,2}:\d{2}/);
  return match ? match[0].padStart(5, '0') : '';
}

function timeOnDate(time, date = new Date()) {
  const [hours, minutes] = time.split(':').map(Number);
  const result = new Date(date);
  result.setHours(hours, minutes, 0, 0);
  return result;
}

function getPrayerStatus(now = new Date()) {
  const events = PRAYER_KEYS.map(key => ({ key, date: timeOnDate(state.prayerTimes[key], now) }));
  let next = events.find(event => event.date > now);
  if (!next) {
    next = { key: 'Fajr', date: timeOnDate(state.prayerTimes.Fajr, new Date(now.getTime() + 86400000)) };
  }
  const priorEvents = events.filter(event => event.date <= now);
  const current = priorEvents.length ? priorEvents[priorEvents.length - 1] : { key: 'Isha', date: timeOnDate(state.prayerTimes.Isha, new Date(now.getTime() - 86400000)) };
  const total = Math.max(1, next.date - current.date);
  const elapsed = clamp(now - current.date, 0, total);
  return { current, next, remaining: next.date - now, progress: Math.round((elapsed / total) * 100) };
}

function formatDuration(milliseconds) {
  const totalSeconds = Math.max(0, Math.floor(milliseconds / 1000));
  const hours = Math.floor(totalSeconds / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;
  return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
}

function qiblaDirection(lat, lon) {
  const kaabaLat = 21.4225 * Math.PI / 180;
  const kaabaLon = 39.8262 * Math.PI / 180;
  const userLat = lat * Math.PI / 180;
  const userLon = lon * Math.PI / 180;
  const y = Math.sin(kaabaLon - userLon);
  const x = Math.cos(userLat) * Math.tan(kaabaLat) - Math.sin(userLat) * Math.cos(kaabaLon - userLon);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}


function currentReciter() {
  return RECITERS[state.data.quran.reciter] || RECITERS['ar.alafasy'];
}

function currentAdhan() {
  const value = state.data.settings.adhanVoice;
  if (ADHAN_SOUNDS[value]) return ADHAN_SOUNDS[value];
  const legacy = Object.entries(ADHAN_SOUNDS).find(([, item]) => item.label === value);
  return legacy ? legacy[1] : ADHAN_SOUNDS.makkah;
}

function globalAyahNumber(surah, ayah) {
  const before = SURAH_VERSE_COUNTS.slice(0, Math.max(0, Number(surah) - 1)).reduce((sum, count) => sum + count, 0);
  return before + Number(ayah);
}

function ayahAudioUrl(surah, ayah, edition = state.data.quran.reciter, knownGlobalNumber = null) {
  const reciter = RECITERS[edition] || RECITERS['ar.alafasy'];
  const globalNumber = knownGlobalNumber || globalAyahNumber(surah, ayah);
  return `https://cdn.islamic.network/quran/audio/${reciter.bitrate}/${edition}/${globalNumber}.mp3`;
}

function surahAudioUrl(surah, edition = state.data.quran.reciter) {
  const reciter = RECITERS[edition] || RECITERS['ar.alafasy'];
  return `https://cdn.islamic.network/quran/audio-surah/${reciter.bitrate}/${edition}/${Number(surah)}.mp3`;
}

async function fetchJSON(url, timeout = 14000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeout);
  try {
    const response = await fetch(url, { cache: 'force-cache', signal: controller.signal });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    return await response.json();
  } finally {
    clearTimeout(timer);
  }
}

async function fetchSurah(number = state.data.quran.surah) {
  const valid = clamp(Number(number), 1, 114);
  state.quranLoading = true;
  state.quranSurah = null;
  if (state.page === 'quran') renderCurrentPage();

  const textUrls = [
    `https://api.alquran.cloud/v1/surah/${valid}/quran-uthmani`,
    `https://api.alquran.cloud/v1/surah/${valid}`
  ];
  const audioUrl = `https://api.alquran.cloud/v1/surah/${valid}/${encodeURIComponent(state.data.quran.reciter)}`;

  try {
    let textPayload = null;
    for (const url of textUrls) {
      try {
        textPayload = await fetchJSON(url);
        if (textPayload?.data?.ayahs?.length) break;
      } catch (error) {
        console.warn('تعذر مصدر نص القرآن:', url, error);
      }
    }

    let audioPayload = null;
    try {
      audioPayload = await fetchJSON(audioUrl);
    } catch (error) {
      console.warn('تعذر مصدر صوت القرآن، سيُستخدم رابط CDN مباشر.', error);
    }

    const textSurah = textPayload?.data;
    const audioSurah = audioPayload?.data;
    const base = textSurah?.ayahs?.length ? textSurah : audioSurah;

    if (!base?.ayahs?.length) throw new Error('No Quran data');

    const audioAyahs = new Map(
      (audioSurah?.ayahs || []).map(ayah => [Number(ayah.numberInSurah), ayah])
    );

    state.quranSurah = {
      number: valid,
      name: (base.name || SURAHS[valid - 1]?.name || 'سورة').replace('سُورَةُ ', ''),
      loadError: false,
      ayahs: base.ayahs.map(ayah => {
        const audioAyah = audioAyahs.get(Number(ayah.numberInSurah));
        const globalNumber = Number(ayah.number) || Number(audioAyah?.number) || globalAyahNumber(valid, ayah.numberInSurah);
        return {
          number: globalNumber,
          numberInSurah: Number(ayah.numberInSurah),
          text: ayah.text,
          audio: audioAyah?.audio || ayahAudioUrl(valid, ayah.numberInSurah, state.data.quran.reciter, globalNumber)
        };
      })
    };
  } catch (error) {
    console.error('تعذر تحميل السورة', error);
    state.quranSurah = valid === 1
      ? {
          ...structuredClone(FALLBACK_SURAH),
          loadError: false,
          ayahs: FALLBACK_SURAH.ayahs.map(ayah => ({
            ...ayah,
            number: globalAyahNumber(1, ayah.numberInSurah),
            audio: ayahAudioUrl(1, ayah.numberInSurah)
          }))
        }
      : {
          number: valid,
          name: SURAHS[valid - 1]?.name || 'سورة',
          loadError: true,
          ayahs: []
        };
  } finally {
    state.quranLoading = false;
    if (state.page === 'quran') renderCurrentPage();
  }
}

  clearInterval(state.countdownTimer);

  state.countdownTimer = setInterval(() => {

function updatePrayerLiveWidgets() {
  const status = getPrayerStatus();
  document.querySelectorAll('[data-live-next-name]').forEach(node => { node.textContent = PRAYER_LABELS[status.next.key]; });
  document.querySelectorAll('[data-live-next-time]').forEach(node => { node.textContent = formatTime12(state.prayerTimes[status.next.key]); });
  document.querySelectorAll('[data-live-countdown]').forEach(node => { node.textContent = formatDuration(status.remaining); });
  document.querySelectorAll('[data-live-progress]').forEach(node => { node.style.width = `${status.progress}%`; });
}

function getAppLogo() {
  return state.data?.settings?.customLogo || DEFAULT_APP_LOGO;
}

function applyBranding() {
  const logo = getAppLogo();
  document.querySelectorAll('.app-logo').forEach(image => {
    if (image.src !== logo) image.src = logo;
  });
  document.getElementById('app-favicon')?.setAttribute('href', logo);
}

function formatAudioTime(seconds) {
  if (!Number.isFinite(seconds) || seconds < 0) return '00:00';
  const minutes = Math.floor(seconds / 60);
  const rest = Math.floor(seconds % 60);
  return `${String(minutes).padStart(2, '0')}:${String(rest).padStart(2, '0')}`;
}

function applyTheme(theme, countChange = true) {
  const valid = THEMES[theme] ? theme : 'night';
  const changed = state.data?.settings?.theme && state.data.settings.theme !== valid;
  document.body.dataset.theme = valid;
  document.querySelector('meta[name="theme-color"]')?.setAttribute('content', valid === 'morning' ? '#f5f0e3' : valid === 'emerald' ? '#063c31' : '#041b15');
  localStorage.setItem(`${STORAGE_PREFIX}_theme`, valid);

function navigate(page, { replace = false } = {}) {
  const validPages = [...NAV_ITEMS.map(item => item.id), 'profile'];
  const target = validPages.includes(page) ? page : 'home';
  if (replace) history.replaceState(null, '', `#${target}`); else if (location.hash !== `#${target}`) location.hash = target;
  state.page = target;
  closeDrawer();
  closeModal();
  renderApp();
  requestAnimationFrame(() => els.pageRoot?.scrollIntoView({ behavior: 'smooth', block: 'start' }));
}

function renderApp() {
  resetDailyIfNeeded();
  updateChrome();
  renderCurrentPage();
  applyBranding();
  updatePrayerLiveWidgets();
  updateAudioUI();
}

function renderCurrentPage() {
  const renderers = {
    home: renderHome,
    prayers: renderPrayers,
    azkar: renderAzkar,
    quran: renderQuran,
    wird: renderWird,
    achievements: renderAchievements,
    notifications: renderNotifications,
    articles: renderArticles,
    settings: renderSettings,
    profile: renderProfile
  };
  const renderer = renderers[state.page] || renderers.home;
  els.pageRoot.innerHTML = `<section class="page page-${state.page}">${renderer()}</section>`;
  applyPageVariables();
}

function applyPageVariables() {
  document.documentElement.style.setProperty('--quran-scale', String(state.data.quran.fontScale));
  document.body.classList.toggle('reduce-motion', Boolean(state.data.settings.reduceMotion));
}

function openDrawer() {
  els.mobileDrawer.classList.add('is-open');
  els.mobileDrawer.setAttribute('aria-hidden', 'false');
  els.drawerBackdrop.hidden = false;
}
function closeDrawer() {
  els.mobileDrawer.classList.remove('is-open');
  els.mobileDrawer.setAttribute('aria-hidden', 'true');
  els.drawerBackdrop.hidden = true;
}
function openModal(content) {
  els.modalContent.innerHTML = content;
  els.modal.hidden = false;
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  els.modal.hidden = true;
  els.modalContent.innerHTML = '';
  document.body.style.overflow = '';
}
function toast(message, type = '') {
  const node = document.createElement('div');
  node.className = `toast ${type}`;
  node.textContent = message;
  els.toastRegion.appendChild(node);
  setTimeout(() => node.remove(), 3500);
}

function showOnboarding(step = 'country') {
  state.onboardingStep = step;
  els.app.hidden = true;
  els.onboarding.hidden = false;
  renderOnboarding();
}

function renderOnboarding() {
  const countryOptions = Object.values(COUNTRIES).map(item => `<option value="${item.code}" ${state.onboardingCountry === item.code ? 'selected' : ''}>${item.country} — ${item.city}</option>`).join('');
  let html = '';
  if (state.onboardingStep === 'country') {
    html = `<span class="eyebrow">الخطوة الأولى</span><h1>حدد بلدك</h1><p>سنستخدمه لمواقيت الصلاة والمنطقة الزمنية وطريقة الحساب المناسبة.</p><div class="field"><label for="onboarding-country">الدولة والمدينة</label><select id="onboarding-country" class="select-input">${countryOptions}</select></div><div class="button-group" style="margin-top:15px"><button class="primary-button full" data-onboarding="next-auth">التالي</button></div>`;
  } else if (state.onboardingStep === 'auth') {
    html = `<span class="eyebrow">الخطوة الثانية</span><h1>اختر طريقة الدخول</h1><p>حساب Google والأسماء الخاصة يحفظان بياناتك. وضع الضيف مؤقت ولا يحفظ شيئًا بعد إغلاق الجلسة.</p><div class="auth-grid"><button class="auth-option" data-onboarding="google"><span class="auth-mark">G</span><span><strong>الدخول بحساب Google</strong><small>مزامنة البيانات بين الأجهزة</small></span></button><button class="auth-option" data-onboarding="guest"><span class="auth-mark">◌</span><span><strong>الدخول كضيف</strong><small>تجربة مباشرة بلا حفظ دائم</small></span></button><button class="auth-option" data-onboarding="special"><span class="auth-mark">★</span><span><strong>الأسماء الخاصة</strong><small>حساب محلي مستقل بكلمة سر</small></span></button></div><button class="ghost-button full" style="margin-top:10px" data-onboarding="back-country">رجوع</button>`;
  } else if (state.onboardingStep === 'special') {
    html = `<span class="eyebrow">الأسماء الخاصة</span><h1>اختر الاسم</h1><p>لكل اسم ملف مستقل محفوظ على هذا الجهاز.</p><div class="special-list">${SPECIAL_NAMES.map(name => `<button class="special-name-option" data-special-name="${escapeHTML(name)}"><span class="auth-mark">◎</span><span><strong>${escapeHTML(name)}</strong><small>دخول أو إنشاء كلمة سر</small></span></button>`).join('')}</div><button class="ghost-button full" data-onboarding="back-auth">رجوع</button>`;
  } else if (state.onboardingStep === 'pin') {
    const accounts = getSpecialAccounts();

  }
  els.onboardingContent.innerHTML = html;
}

function startApp({ skipLoad = false } = {}) {
  els.onboarding.hidden = true;
  els.app.hidden = false;
  if (!skipLoad) loadData();
  applyTheme(state.data.settings.theme, false);
  const hashPage = location.hash.replace('#', '');
  state.page = [...NAV_ITEMS.map(item => item.id), 'profile'].includes(hashPage) ? hashPage : 'home';
  renderApp();
  fetchPrayerTimes();
  startLiveClock();
  if (!state.quranSurah) fetchSurah(state.data.quran.surah);
