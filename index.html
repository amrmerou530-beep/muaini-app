/* ------------------------- 5) مساعدات الصفحات ------------------------- */
function panel(title, content, { subtitle = '', icon = '', className = '' } = {}) {
  return `<article class="panel ${className}"><div class="panel-title"><div><h2>${title}</h2>${subtitle ? `<p>${subtitle}</p>` : ''}</div>${icon ? `<span class="panel-icon">${icon}</span>` : ''}</div>${content}</article>`;
}
function metric(icon, label, value, tail = '') { return `<article class="metric-card"><span class="metric-icon">${icon}</span><div><small>${label}</small><strong>${value}</strong></div><em>${tail}</em></article>`; }
function todayPrayerCount(data = state.data) { return TRACKED_PRAYERS.filter(key => data.daily.prayerDone[key]).length; }
function totalPrayerDone(data = state.data) { return Number(data.stats.totalPrayerChecks || 0); }
function totalAzkarDone(data = state.data) { return Number(data.stats.totalAzkarClicks || 0); }
function azkarCategoryProgress(categoryKey = state.data.azkar.category) {
  const category = AZKAR[categoryKey];
  const complete = category.items.filter(item => (state.data.daily.azkarCounts[item.id] || 0) >= item.target).length;
  return { complete, total: category.items.length, percent: percent(complete, category.items.length) };
}
function allAzkarProgress() {
  const items = Object.values(AZKAR).flatMap(category => category.items);
  const complete = items.filter(item => (state.data.daily.azkarCounts[item.id] || 0) >= item.target).length;
  return { complete, total: items.length, percent: percent(complete, items.length) };
}
function calculateWirdPercent(data = state.data) {
  const ratios = WIRD_TASKS.map(task => { const target = data.wird?.targets?.[task.id] || task.target; return clamp((data.daily.wirdProgress[task.id] || 0) / target, 0, 1); });
  return Math.round((ratios.reduce((sum, value) => sum + value, 0) / ratios.length) * 100);
}
function unreadNotifications() { return state.data.notifications.filter(item => item.unread).length; }
function unlockedBadges() { return BADGES.filter(badge => badge.condition(state.data)); }
function updateAchievementStats() { /* badges computed dynamically */ }

function weeklyChart(values = state.data.stats.weekly) {
  const days = ['السبت', 'الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة'];
  return `<div class="chart-bars">${values.map((value, index) => `<div class="chart-column"><div class="chart-bar" style="height:${clamp(value, 3, 100)}%" title="${value}%"></div><small>${days[index]}</small></div>`).join('')}</div>`;
}

function pageHero({ eyebrow = '', title, description, actions = '', symbol = '🕌', caption = '' }) {
  return `<section class="page-hero ornament"><div><span class="eyebrow">${eyebrow}</span><h1>${title}</h1><p>${description}</p>${actions ? `<div class="hero-actions">${actions}</div>` : ''}</div><div class="hero-art"><span class="art-symbol">${symbol}</span>${caption ? `<span class="art-caption">${caption}</span>` : ''}</div></section>`;
}

  return `

function renderAzkar() {
  const category = AZKAR[state.data.azkar.category] || AZKAR.morning;
  const progress = azkarCategoryProgress(state.data.azkar.category);
  const allProgress = allAzkarProgress();
  const tabs = Object.entries(AZKAR).map(([key, item]) =>
    `<button class="tab-button ${state.data.azkar.category === key ? 'is-active' : ''}" data-azkar-category="${key}">${item.icon} ${item.title}</button>`
  ).join('');

  const items = category.items.map(item => {
    const count = state.data.daily.azkarCounts[item.id] || 0;
    const complete = count >= item.target;
    const favorite = state.data.azkar.favorites.includes(item.id);
    return `
      <article class="azkar-item ${complete ? 'is-complete' : ''}">
        <div>
          <div class="azkar-text">${escapeHTML(item.text)}</div>
          <div class="azkar-source">${escapeHTML(item.source)} — المطلوب ${item.target} ${item.target === 1 ? 'مرة' : 'مرات'}</div>
        </div>
        <div class="azkar-controls">
          <button class="counter-button" data-azkar-count="${item.id}" aria-label="زيادة العداد">${Math.min(count, item.target)}/${item.target}</button>
          <div class="azkar-tools-row">
            <button class="azkar-speak" data-azkar-speak="${item.id}" aria-label="الاستماع إلى الذكر">🔊</button>
            <button class="favorite-button ${favorite ? 'is-active' : ''}" data-azkar-favorite="${item.id}" aria-label="إضافة للمفضلة">${favorite ? '♥' : '♡'}</button>
          </div>
        </div>
      </article>`;
  }).join('');

  return `
    ${pageHero({
      eyebrow: 'حصن المسلم',
      title: 'الأذكار',
      description: 'أذكار الصباح كاملة بعدادات مستقلة، إلى جانب أذكار المساء وما بعد الصلاة والنوم والاستيقاظ والسبحة الإلكترونية.',

      symbol: '📿',
      caption: '﴿ ألا بذكر الله تطمئن القلوب ﴾'
    })}
    <div class="dashboard-grid three">
      ${metric('◉', 'أذكار القسم', `${progress.complete}/${progress.total}`, `${progress.percent}%`)}
      ${metric('✓', 'إجمالي اليوم', `${allProgress.complete}/${allProgress.total}`, `${allProgress.percent}%`)}
      ${metric('♥', 'المفضلة', `${state.data.azkar.favorites.length} ذكر`, 'محفوظ')}
    </div>
    <div class="panel" style="margin-top:14px"><div class="tabs">${tabs}</div></div>
    <div class="azkar-layout">
      ${panel(
        category.title,
        `<div class="list-stack">${items}</div>
         <div class="row-between" style="margin-top:13px">
           <button class="ghost-button" data-action="reset-azkar-category">إعادة عدادات القسم</button>
           <strong class="green">${progress.percent}% مكتمل</strong>
         </div>`,
        { subtitle: `${category.subtitle} — ${category.items.length} ذكر`, icon: category.icon }
      )}
      <div class="stack">
        ${panel('السبحة الإلكترونية', `<div class="tasbih-display" data-action="tasbih-add"><span class="muted">اضغط للعد</span><strong>${formatNumber(state.data.azkar.tasbih)}</strong><small>الهدف ${formatNumber(state.data.azkar.tasbihGoal)}</small></div><div class="button-group" style="margin-top:10px"><button class="secondary-button" data-action="tasbih-add">+1</button><button class="ghost-button" data-action="tasbih-reset">تصفير</button></div>`, { icon: '◉' })}
        ${panel('أدوات مساعدة', `<div class="setting-row"><div><strong>تذكير الصباح</strong><small>${escapeHTML(state.data.settings.morningAzkarTime || '07:00')}</small></div><label class="toggle"><input type="checkbox" data-setting="azkarReminders" ${state.data.settings.azkarReminders ? 'checked' : ''}><span class="toggle-track"></span></label></div><div class="setting-row"><div><strong>قراءة مريحة</strong><small>تكبير الخط من الإعدادات</small></div><button class="small-button" data-route="settings">تعديل</button></div><div class="setting-row"><div><strong>الاستماع للنص</strong><small>يستخدم الصوت العربي المتاح في جهازك</small></div><span class="status-pill ${'speechSynthesis' in window ? 'ok' : ''}">${'speechSynthesis' in window ? 'متاح' : 'غير مدعوم'}</span></div>`, { icon: '⚙' })}

function renderQuran() {
  const current = state.quranSurah || {
    number: state.data.quran.surah,
    name: SURAHS[state.data.quran.surah - 1]?.name || 'سورة',
    ayahs: [],
    loadError: false
  };
  const filteredSurahs = SURAHS.filter(surah => surah.name.includes(state.quranSearch.trim())).slice(0, 114);
  const planDays = state.data.quran.planDays;
  const pagesPerDay = Math.max(1, Math.ceil(604 / planDays));
  const khatmaPercent = clamp(Math.round((state.data.stats.quranPagesTotal % 604) / 604 * 100), 0, 100);
  const reciter = currentReciter();
  const selectedAyah = current.ayahs?.find(ayah => Number(ayah.numberInSurah) === Number(state.data.quran.selectedAyah));

  let reader = '';
  if (state.quranLoading) {
    reader = `<div class="loading-box"><span class="spinner"></span><span>جاري تحميل نص السورة والتلاوة…</span></div>`;
  } else if (current.loadError) {
    reader = `<div class="quran-error"><strong>تعذر تحميل نص سورة ${escapeHTML(current.name)}</strong><span>تأكد من اتصال الإنترنت ثم أعد المحاولة.</span><button class="primary-button" data-action="reload-quran">إعادة التحميل</button></div>`;
  } else {
    reader = `<div class="surah-heading">سورة ${escapeHTML(current.name)}</div>${(current.ayahs || []).map(ayah => `<span class="ayah ${state.data.quran.selectedAyah === ayah.numberInSurah ? 'is-selected' : ''}" data-quran-ayah="${ayah.numberInSurah}" data-audio="${escapeHTML(ayah.audio || ayahAudioUrl(current.number, ayah.numberInSurah))}">${escapeHTML(ayah.text)} <span class="ayah-number">${ayah.numberInSurah}</span></span> `).join('')}`;
  }

  const reciterOptions = Object.entries(RECITERS).map(([id, item]) =>
    `<option value="${id}" ${state.data.quran.reciter === id ? 'selected' : ''}>${item.label}</option>`

      ${metric('♥', 'السور المفضلة', `${state.data.quran.favoriteSurahs.length}`, 'سورة')}
      ${metric('⌑', 'العلامات', `${state.data.quran.bookmarks.length}`, 'موضع')}

    <div class="panel" style="margin-top:14px">
      <div class="row-between wrap">

function renderWird() {
  const totalPercent = calculateWirdPercent();
  const tasks = WIRD_TASKS.map(task => {
    const value = state.data.daily.wirdProgress[task.id] || 0;
    const target = state.data.wird.targets?.[task.id] || task.target;
    const taskPercent = percent(value, target);
    return `<div class="wird-task"><span class="task-icon">${task.icon}</span><div><strong>${task.title}</strong><small>${task.subtitle} — الهدف ${target} ${task.unit}</small></div><div><div class="task-progress">${value}/${target}</div><div class="task-controls"><button data-wird-task="${task.id}" data-delta="-1">−</button><button data-wird-task="${task.id}" data-delta="1">+</button></div></div><button class="small-button" data-wird-complete="${task.id}" title="إكمال المهمة">${taskPercent >= 100 ? '✓' : '○'}</button></div>`;
  }).join('');
  return `
    ${pageHero({ eyebrow: 'استمر على طاعة الله', title: 'الورد اليومي', description: 'ورد مقترح أو مخصص يجمع الصلاة والقرآن والأذكار والدعاء في قائمة واحدة واضحة.', actions: `<button class="primary-button" data-action="customize-wird">تخصيص الورد</button><button class="secondary-button" data-action="share-wird">مشاركة الإنجاز</button>`, symbol: '📖🌱', caption: 'الاستمرارية مفتاح القبول' })}
    <div class="wird-layout">
      <div class="stack">
        ${panel('تقدم الورد', `<div class="center"><div class="progress-circle" style="--progress:${totalPercent}"><strong>${totalPercent}%</strong></div><p class="muted">اكتمال ورد اليوم</p></div><div class="row-between"><span>القرآن</span><b class="green">${percent(state.data.daily.wirdProgress['quran-pages'], state.data.wird.targets?.['quran-pages'] || 12)}%</b></div><div class="progress-track"><span style="width:${percent(state.data.daily.wirdProgress['quran-pages'], state.data.wird.targets?.['quran-pages'] || 12)}%"></span></div><div class="row-between" style="margin-top:9px"><span>الأذكار</span><b class="green">${Math.round((percent(state.data.daily.wirdProgress['morning-azkar'],1)+percent(state.data.daily.wirdProgress['evening-azkar'],1))/2)}%</b></div>`, { icon: '◔' })}
        ${panel('الورد المتواصل', `<div class="streak-card"><div class="streak-number">${state.data.stats.currentStreak}</div><strong>يومًا متتاليًا 🔥</strong><p class="muted">أفضل سلسلة: ${state.data.stats.bestStreak} يوم</p></div>`, { icon: '🔥' })}
      </div>
      ${panel('قائمة ورد اليوم', `<div class="tabs" style="margin-bottom:12px"><button class="tab-button ${state.data.wird.mode === 'suggested' ? 'is-active' : ''}" data-wird-mode="suggested">الورد المقترح</button><button class="tab-button ${state.data.wird.mode === 'custom' ? 'is-active' : ''}" data-wird-mode="custom">ورد مخصص</button></div><div class="list-stack">${tasks}</div>`, { subtitle: 'عدّل التقدم أو أكمل المهمة مباشرة', icon: '✓' })}
      <div class="stack">
        ${panel('الهدف الشهري', `<strong class="gold" style="font-size:2rem">${state.data.wird.monthlyGoal} من 30 يومًا</strong><p class="muted">باقي ${Math.max(0,30-state.data.wird.monthlyGoal)} أيام على الهدف</p><div class="progress-track"><span style="width:${percent(state.data.wird.monthlyGoal,30)}%"></span></div><button class="secondary-button full" style="margin-top:12px" data-action="edit-monthly-goal">تعديل الهدف</button>`, { icon: '▦' })}
        ${panel('أفضل أوقات الورد', `<div class="list-stack"><div class="list-row"><span class="row-icon">☀</span><div><strong>بعد الفجر</strong><small>06:00 — 07:00</small></div><span class="row-value">مقترح</span></div><div class="list-row"><span class="row-icon">◓</span><div><strong>بعد العصر</strong><small>16:00 — 17:00</small></div><span class="row-value">هادئ</span></div><div class="list-row"><span class="row-icon">☾</span><div><strong>قبل النوم</strong><small>21:00 — 22:00</small></div><span class="row-value">ختام</span></div></div>`, { icon: '◷' })}

  }).join('');
  const prayerP = percent(todayPrayerCount(),5);
  const azkarP = allAzkarProgress().percent;
  const quranP = percent(state.data.daily.quranPages, Math.ceil(604/state.data.quran.planDays));
  const wirdP = calculateWirdPercent();
  return `
    ${pageHero({ eyebrow: 'تقدمك الهادئ', title: 'الإنجازات والإحصاءات', description: 'لوحة بسيطة توضح الاستمرارية والتقدم دون أن تحول العبادة إلى منافسة أو ضغط.', actions: `<button class="primary-button" data-action="share-achievements">مشاركة ملخص</button>`, symbol: '🏆', caption: `${unlockedBadges().length} من ${BADGES.length} شارات` })}

      ${metric('◉', 'نقرات الأذكار', formatNumber(state.data.stats.totalAzkarClicks), 'ذكر')}
      ${metric('▤', 'صفحات القرآن', formatNumber(state.data.stats.quranPagesTotal), 'صفحة')}
      ${metric('🔥', 'أفضل سلسلة', formatNumber(state.data.stats.bestStreak), 'يوم')}
    </div>
    <div class="content-grid">
      ${panel('الشارات', `<div class="badge-grid">${badges}</div>`, { subtitle: 'تفتح تلقائيًا مع الاستمرار', icon: '♕', className: 'span-2' })}

      ${panel('أرقام مميزة', `<div class="list-stack"><div class="list-row"><span class="row-icon">🔥</span><div><strong>السلسلة الحالية</strong><small>ورد يومي متواصل</small></div><span class="row-value">${state.data.stats.currentStreak}</span></div><div class="list-row"><span class="row-icon">♕</span><div><strong>الشارات المفتوحة</strong><small>من جميع الإنجازات</small></div><span class="row-value">${unlockedBadges().length}</span></div><div class="list-row"><span class="row-icon">◔</span><div><strong>متوسط الأسبوع</strong><small>مجموع العبادات</small></div><span class="row-value">${Math.round(state.data.stats.weekly.reduce((a,b)=>a+b,0)/7)}%</span></div></div>`, { icon: '★' })}

async function handleOnboardingClick(target) {
  const action = target.closest('[data-onboarding]')?.dataset.onboarding;
  if (!action) return false;
  if (action === 'next-auth') {
    const select = document.getElementById('onboarding-country');
    state.onboardingCountry = select?.value || 'EG';
    localStorage.setItem(`${STORAGE_PREFIX}_country`, state.onboardingCountry);
    state.onboardingStep = 'auth';
  } else if (action === 'back-country') state.onboardingStep = 'country';
  else if (action === 'back-auth') state.onboardingStep = 'auth';
  else if (action === 'back-special') state.onboardingStep = 'special';
  else if (action === 'special') state.onboardingStep = 'special';
  else if (action === 'google') { await loginGoogle(); return true; }
  else if (action === 'guest') {
    setSession({ type: 'guest', id: `guest-${Date.now()}`, name: 'ضيف مُعيني', email: '', avatar: 'data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20512%20512%22%3E%0A%3Cdefs%3E%3ClinearGradient%20id=%22a%22%20x1=%220%22%20y1=%220%22%20x2=%221%22%20y2=%221%22%3E%3Cstop%20stop-color=%22#0b5b45%22/%3E%3Cstop%20offset=%221%22%20stop-color=%22#03130f%22/%3E%3C/linearGradient%3E%3C/defs%3E%0A%3Crect%20width=%22512%22%20height=%22512%22%20rx=%22128%22%20fill=%22url(#a)%22/%3E%0A%3Ccircle%20cx=%22256%22%20cy=%22196%22%20r=%2282%22%20fill=%22#f8f1df%22/%3E%0A%3Cpath%20d=%22M108%20448c12-98%2073-158%20148-158s136%2060%20148%20158%22%20fill=%22#f8f1df%22/%3E%0A%3Ccircle%20cx=%22256%22%20cy=%22256%22%20r=%22226%22%20fill=%22none%22%20stroke=%22#f0c772%22%20stroke-width=%2214%22%20opacity=%22.9%22/%3E%0A%3C/svg%3E' });

async function handleSpecialPinSubmit(form) {
  const pin = form.elements.pin.value.trim();
  const confirm = form.elements.confirm?.value.trim();
  const statusNode = document.getElementById('pin-status');
  if (!/^\d{4,12}$/.test(pin)) {
    statusNode.innerHTML = '<div class="status-message">اكتب من 4 إلى 12 رقمًا.</div>';
    return;
  }
  const accounts = getSpecialAccounts();
  const existing = accounts[state.specialName];
  if (!existing && pin !== confirm) {
    statusNode.innerHTML = '<div class="status-message">كلمتا السر غير متطابقتين.</div>';
    return;
  }
  const pinHash = await sha256(pin);
  if (existing && existing.pinHash !== pinHash) {
    statusNode.innerHTML = '<div class="status-message">كلمة السر غير صحيحة.</div>';
    return;
  }
  if (!existing) {
    accounts[state.specialName] = { pinHash, createdAt: new Date().toISOString() };
    saveSpecialAccounts(accounts);
  }
  setSession({ type: 'special', id: encodeURIComponent(state.specialName), name: state.specialName, email: '', avatar: 'data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20512%20512%22%3E%0A%3Cdefs%3E%3ClinearGradient%20id=%22a%22%20x1=%220%22%20y1=%220%22%20x2=%221%22%20y2=%221%22%3E%3Cstop%20stop-color=%22#0b5b45%22/%3E%3Cstop%20offset=%221%22%20stop-color=%22#03130f%22/%3E%3C/linearGradient%3E%3C/defs%3E%0A%3Crect%20width=%22512%22%20height=%22512%22%20rx=%22128%22%20fill=%22url(#a)%22/%3E%0A%3Ccircle%20cx=%22256%22%20cy=%22196%22%20r=%2282%22%20fill=%22#f8f1df%22/%3E%0A%3Cpath%20d=%22M108%20448c12-98%2073-158%20148-158s136%2060%20148%20158%22%20fill=%22#f8f1df%22/%3E%0A%3Ccircle%20cx=%22256%22%20cy=%22256%22%20r=%22226%22%20fill=%22none%22%20stroke=%22#f0c772%22%20stroke-width=%2214%22%20opacity=%22.9%22/%3E%0A%3C/svg%3E' });
  state.data = createDefaultData();
  state.data.settings.country = state.onboardingCountry;
  startApp();
}

function togglePrayer(key) {
  const before = Boolean(state.data.daily.prayerDone[key]);
  state.data.daily.prayerDone[key] = !before;
  if (!before) state.data.stats.totalPrayerChecks += 1;
  else state.data.stats.totalPrayerChecks = Math.max(0, state.data.stats.totalPrayerChecks - 1);
  state.data.prayerHistory = state.data.prayerHistory.filter(item => !(item.date === dateKey() && item.prayer === key));
  if (!before) state.data.prayerHistory.push({ date: dateKey(), prayer: key, completedAt: new Date().toISOString() });
  saveData();
  renderApp();
}

function toggleFriday(key) {
  if (!(key in state.data.friday)) return;
  state.data.friday[key] = !state.data.friday[key];
  state.data.friday.completed = ['kahf','salawat','earlyMosque','dua'].every(item => state.data.friday[item]);
  saveData();
  renderCurrentPage();
}

function incrementAzkar(id) {
  const item = Object.values(AZKAR).flatMap(category => category.items).find(entry => entry.id === id);
  if (!item) return;
  const current = state.data.daily.azkarCounts[id] || 0;
  if (current < item.target) {
    state.data.daily.azkarCounts[id] = current + 1;
    state.data.stats.totalAzkarClicks += 1;
  } else state.data.daily.azkarCounts[id] = 0;
  saveData();
  renderCurrentPage();
}

function toggleAzkarFavorite(id) {
  const list = state.data.azkar.favorites;
  const index = list.indexOf(id);
  if (index >= 0) list.splice(index, 1); else list.push(id);
  saveData();
  renderCurrentPage();
}

function updateWirdTask(id, delta) {
  const task = WIRD_TASKS.find(item => item.id === id);
  if (!task) return;
  const current = state.data.daily.wirdProgress[id] || 0;
  const target = state.data.wird.targets?.[id] || task.target;
  state.data.daily.wirdProgress[id] = clamp(current + delta, 0, target);
  if (id === 'quran-pages') state.data.daily.quranPages = state.data.daily.wirdProgress[id];
  saveData();
  renderCurrentPage();
}

function completeWirdTask(id) {
  const task = WIRD_TASKS.find(item => item.id === id);
  if (!task) return;
  const target = state.data.wird.targets?.[id] || task.target;
  state.data.daily.wirdProgress[id] = state.data.daily.wirdProgress[id] >= target ? 0 : target;
  if (id === 'quran-pages') state.data.daily.quranPages = state.data.daily.wirdProgress[id];
  saveData();
  renderCurrentPage();
}

function markPageRead() {
  state.data.daily.quranPages += 1;

function updateAudioUI() {
  if (!els.audioPlayer) return;
  const status = document.getElementById('audio-status');
  const progress = document.getElementById('audio-progress-bar');
  const currentTime = document.getElementById('audio-current-time');
  const duration = document.getElementById('audio-duration');
  const title = els.audioPlayer.dataset.title || 'مشغل الصوت';
  if (status) status.textContent = els.audioPlayer.paused ? title : `يعمل الآن: ${title}`;
  if (progress) {
    const value = Number.isFinite(els.audioPlayer.duration) && els.audioPlayer.duration > 0
      ? (els.audioPlayer.currentTime / els.audioPlayer.duration) * 100
      : 0;
    progress.style.width = `${clamp(value, 0, 100)}%`;
  }
  if (currentTime) currentTime.textContent = formatAudioTime(els.audioPlayer.currentTime);
  if (duration) duration.textContent = formatAudioTime(els.audioPlayer.duration);
}

function stopAudio(showToast = true) {
  if (!els.audioPlayer) return;
  els.audioPlayer.pause();
  els.audioPlayer.currentTime = 0;
  els.audioPlayer.removeAttribute('src');
  els.audioPlayer.load();
  els.audioPlayer.dataset.source = '';
  els.audioPlayer.dataset.mode = '';
  els.audioPlayer.dataset.title = 'لا يوجد صوت قيد التشغيل';
  updateAudioUI();
  if (showToast) toast('تم إيقاف الصوت');
}

async function playAudioSource(src, title, mode = 'general') {
  if (!state.data.settings.soundEnabled) {
    toast('تشغيل الصوت مغلق من الإعدادات.', 'error');
    return;
  }
  if (!src) {
    toast('لا يوجد رابط صوت متاح.', 'error');
    return;
  }

  const sameSource = els.audioPlayer.dataset.source === src;
  if (sameSource && !els.audioPlayer.paused) {
    els.audioPlayer.pause();
    updateAudioUI();
    toast('تم إيقاف الصوت مؤقتًا');
    return;
  }

  if (!sameSource) {
    els.audioPlayer.src = src;
    els.audioPlayer.dataset.source = src;
  }

  els.audioPlayer.dataset.mode = mode;
  els.audioPlayer.dataset.title = title;
  els.audioPlayer.volume = clamp(Number(state.data.settings.volume || 75) / 100, 0, 1);
  els.audioPlayer.playbackRate = mode.startsWith('quran') ? Number(state.data.quran.playbackRate || 1) : 1;
  els.audioPlayer.loop = mode === 'quran-ayah' && Boolean(state.data.quran.repeatAyah);

  try {
    await els.audioPlayer.play();
    updateAudioUI();
    toast(`بدأ التشغيل: ${title}`, 'success');
  } catch (error) {
    console.error('Audio play failed', error);
    toast('تعذر تشغيل الصوت. تأكد من الإنترنت واضغط مرة أخرى.', 'error');
  }
}

}

function playSurahAudio() {
  const surah = state.data.quran.surah;
  const name = SURAHS[surah - 1]?.name || 'السورة';
  const reciter = currentReciter();
  return playAudioSource(surahAudioUrl(surah), `سورة ${name} — ${reciter.label}`, 'quran-surah');
}

function playSelectedAyah() {
  const ayahNumber = Number(state.data.quran.selectedAyah || 1);
  const selected = state.quranSurah?.ayahs?.find(ayah => Number(ayah.numberInSurah) === ayahNumber);
  const src = selected?.audio || ayahAudioUrl(state.data.quran.surah, ayahNumber);
  const title = `سورة ${SURAHS[state.data.quran.surah - 1]?.name || ''} — الآية ${ayahNumber} — ${currentReciter().label}`;
  return playAudioSource(src, title, 'quran-ayah');
}

function setupAudioEvents() {
  if (!els.audioPlayer) return;
  ['loadedmetadata', 'timeupdate', 'play', 'pause', 'ratechange', 'volumechange'].forEach(eventName => {
    els.audioPlayer.addEventListener(eventName, updateAudioUI);
  });

  els.audioPlayer.addEventListener('error', () => {
    updateAudioUI();
    toast('حدث خطأ في تحميل ملف الصوت. جرّب قارئًا أو صوتًا آخر.', 'error');
  });

  els.audioPlayer.addEventListener('ended', () => {
    updateAudioUI();
    if (els.audioPlayer.dataset.mode !== 'quran-ayah') return;
    if (state.data.quran.repeatAyah) {
      els.audioPlayer.currentTime = 0;
      els.audioPlayer.play().catch(() => {});
      return;
    }
    if (!state.data.quran.autoNext) return;

    const ayahs = state.quranSurah?.ayahs || [];
    const currentIndex = ayahs.findIndex(ayah => Number(ayah.numberInSurah) === Number(state.data.quran.selectedAyah));
    const next = ayahs[currentIndex + 1];
    if (next) {
      selectAyah(next.numberInSurah, next.audio);
      playSelectedAyah();
    } else {
      toast('انتهت السورة', 'success');
    }
  });
}

function toggleCurrentSurahFavorite() {
  const number = Number(state.data.quran.surah);
  const list = state.data.quran.favoriteSurahs;
  const exists = list.includes(number);
  state.data.quran.favoriteSurahs = exists ? list.filter(item => item !== number) : [...list, number];
  saveData();
  renderCurrentPage();
  toast(exists ? 'تمت إزالة السورة من المفضلة' : 'تمت إضافة السورة إلى المفضلة', 'success');
}

function speakAzkar(id) {
  const item = Object.values(AZKAR).flatMap(category => category.items).find(entry => entry.id === id);
  if (!item) return;
  if (!('speechSynthesis' in window)) {
    toast('جهازك لا يدعم القراءة الصوتية للنص.', 'error');
    return;
  }
  speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(item.text.replace(/\*/g, ' '));
  utterance.lang = 'ar';
  utterance.rate = 0.82;
  utterance.volume = clamp(Number(state.data.settings.volume || 75) / 100, 0, 1);
  const arabicVoice = speechSynthesis.getVoices().find(voice => voice.lang?.toLowerCase().startsWith('ar'));
  if (arabicVoice) utterance.voice = arabicVoice;
  speechSynthesis.speak(utterance);
  toast('بدأت القراءة الصوتية', 'success');
}

async function showSelectedTafsir() {
  const surah = Number(state.data.quran.surah);
  const ayah = Number(state.data.quran.selectedAyah || 1);
  openModal(`<h2 id="modal-title">التفسير الميسر</h2><div class="loading-box"><span class="spinner"></span><span>جاري تحميل تفسير الآية ${ayah}…</span></div>`);
  try {
    const payload = await fetchJSON(`https://api.alquran.cloud/v1/ayah/${surah}:${ayah}/ar.muyassar`);
    const text = payload?.data?.text;
    if (!text) throw new Error('No tafsir');
    els.modalContent.innerHTML = `<h2 id="modal-title">تفسير سورة ${SURAHS[surah-1]?.name} — الآية ${ayah}</h2><p style="line-height:2">${escapeHTML(text)}</p><div class="button-group"><button class="primary-button" data-action="close-modal">إغلاق</button><a class="secondary-button" href="https://quran.com/${surah}?startingVerse=${ayah}" target="_blank" rel="noopener">فتح في Quran.com</a></div>`;
  } catch (error) {
    els.modalContent.innerHTML = `<h2 id="modal-title">التفسير</h2><p>تعذر تحميل التفسير الآن. يمكنك فتح الآية مباشرة في Quran.com.</p><a class="primary-button full" href="https://quran.com/${surah}?startingVerse=${ayah}" target="_blank" rel="noopener">فتح الآية والتفسير</a>`;
  }
}

function handleQuranTool(tool) {
  if (tool === 'reader') {
    document.getElementById('quran-reader')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  } else if (tool === 'tafsir') {
    showSelectedTafsir();
  } else if (tool === 'listen') {
    playSelectedAyah();
    document.getElementById('quran-audio-card')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  } else if (tool === 'memorize') {
    const saved = state.data.quran.bookmarks.some(item => item.surah === state.data.quran.surah && item.ayah === state.data.quran.selectedAyah);
    openModal(`<h2 id="modal-title">الحفظ والعلامات</h2><p>الموضع الحالي: سورة ${SURAHS[state.data.quran.surah-1]?.name} — الآية ${state.data.quran.selectedAyah}.</p><button class="primary-button full" data-action="bookmark-ayah">${saved ? 'إزالة علامة الحفظ' : 'حفظ هذا الموضع'}</button>`);
  } else if (tool === 'recitations') {
    quranToolModal('recitations');
  } else if (tool === 'favorites') {
    quranToolModal('favorites');
  }
}

function selectSurah(number, ayah = 1) {
  const valid = clamp(Number(number), 1, 114);
  const validAyah = clamp(Number(ayah) || 1, 1, SURAH_VERSE_COUNTS[valid - 1] || 286);
  stopAudio(false);
  state.data.quran.surah = valid;
  state.data.quran.selectedAyah = validAyah;
  state.data.quran.lastRead = { surah: valid, ayah: validAyah };
  saveData();
  fetchSurah(valid);
}

function selectAyah(number, audio = '') {
  const valid = clamp(Number(number), 1, SURAH_VERSE_COUNTS[state.data.quran.surah - 1] || 286);
  state.data.quran.selectedAyah = valid;
  state.data.quran.lastRead = { surah: state.data.quran.surah, ayah: valid };
  if (audio) els.audioPlayer.dataset.selectedSrc = audio;
  saveData();
  document.querySelectorAll('.ayah').forEach(node => node.classList.toggle('is-selected', Number(node.dataset.quranAyah) === valid));
  const status = document.getElementById('audio-status');
  if (status && els.audioPlayer.paused) status.textContent = `الآية ${valid} — سورة ${SURAHS[state.data.quran.surah - 1]?.name || ''}`;
}



function bookmarkAyah() {
  const bookmark = { surah: state.data.quran.surah, ayah: state.data.quran.selectedAyah };
  const exists = state.data.quran.bookmarks.some(item => item.surah === bookmark.surah && item.ayah === bookmark.ayah);
  if (exists) state.data.quran.bookmarks = state.data.quran.bookmarks.filter(item => !(item.surah === bookmark.surah && item.ayah === bookmark.ayah));
  else state.data.quran.bookmarks.push(bookmark);
  saveData();
  renderApp();
  toast(exists ? 'تم حذف العلامة' : 'تم حفظ العلامة', 'success');
}

function quranToolModal(tool) {
  if (tool === 'recitations') {
    const cards = Object.entries(RECITERS).map(([id, item]) =>
      `<button class="reciter-choice ${state.data.quran.reciter === id ? 'is-active' : ''}" data-reciter-choice="${id}"><strong>${escapeHTML(item.label)}</strong><small class="muted">${item.bitrate} kbps</small></button>`
    ).join('');
    openModal(`<h2 id="modal-title">اختيار القارئ</h2><p class="muted">اختر القارئ ثم شغّل الآية أو السورة من صفحة القرآن.</p><div class="reciter-grid">${cards}</div>`);
    return;
  }

  if (tool === 'favorites') {
    const rows = state.data.quran.favoriteSurahs.length
      ? state.data.quran.favoriteSurahs.map(number => `<div class="list-row"><span class="row-icon">♥</span><div><strong>سورة ${SURAHS[number-1]?.name}</strong><small>السورة رقم ${number}</small></div><button class="small-button" data-surah="${number}">فتح</button></div>`).join('')

    return;
  }

  openModal(`<h2 id="modal-title">القرآن الكريم</h2><p>استخدم أدوات المصحف والقراءة والاستماع من الصفحة مباشرة.</p><button class="primary-button full" data-action="close-modal">حسنًا</button>`);
}

function openArticle(id) {
  const article = ARTICLES.find(item => item.id === id);

async function requestNotifications() {
  if (!('Notification' in window)) { toast('المتصفح لا يدعم إشعارات النظام.', 'error'); return; }
  const permission = await Notification.requestPermission();
  if (permission === 'granted') {
    state.data.settings.notificationsEnabled = true;
    saveData();
    toast('تم تفعيل إشعارات المتصفح', 'success');
  } else toast('لم يتم السماح بالإشعارات', 'error');
}

function openNearbyMosques() {
  const locationConfig = selectedCountry();
  const lat = state.data.settings.autoLocation && Number.isFinite(state.data.settings.deviceLat) ? state.data.settings.deviceLat : locationConfig.lat;
  const lon = state.data.settings.autoLocation && Number.isFinite(state.data.settings.deviceLon) ? state.data.settings.deviceLon : locationConfig.lon;
  const query = encodeURIComponent('مساجد قريبة');
  window.open(`https://www.google.com/maps/search/${query}/@${lat},${lon},14z`, '_blank', 'noopener');
}

function useDeviceLocation() {
  if (!navigator.geolocation) { toast('تحديد الموقع غير متاح في هذا المتصفح.', 'error'); return; }
  toast('جاري تحديد موقعك…');
  navigator.geolocation.getCurrentPosition(position => {
    const direction = Math.round(qiblaDirection(position.coords.latitude, position.coords.longitude));
    state.data.settings.autoLocation = true;
    state.data.settings.deviceLat = position.coords.latitude;
    state.data.settings.deviceLon = position.coords.longitude;
    saveData();
    closeModal();
    if (state.page === 'prayers') renderCurrentPage();
    toast(`تم تحديث القبلة: ${direction}°`, 'success');
  }, () => toast('تعذر الوصول إلى موقع الجهاز. راجع إذن الموقع.', 'error'), { enableHighAccuracy: true, timeout: 10000 });
}

function exportData() {
  const blob = new Blob([JSON.stringify({ app: 'Muaini', version: 8, exportedAt: new Date().toISOString(), data: state.data }, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const anchor = document.createElement('a');
  anchor.href = url;
  anchor.download = `muaini-backup-${dateKey()}.json`;
  anchor.click();
  URL.revokeObjectURL(url);
  toast('تم إنشاء النسخة الاحتياطية', 'success');
}

function importDataFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      const imported = parsed.data || parsed;
      state.data = deepMerge(createDefaultData(), imported);
      saveData();
      renderApp();
      toast('تم استيراد البيانات بنجاح', 'success');
    } catch { toast('الملف غير صالح أو تالف', 'error'); }
  };
  reader.readAsText(file);
}

async function installApp() {
  if (!state.installPrompt) { toast('التثبيت التلقائي يحتاج نسخة PWA متعددة الملفات؛ هذه نسخة index.html واحدة.', 'error'); return; }
  state.installPrompt.prompt();
  await state.installPrompt.userChoice;
  state.installPrompt = null;
}

function shareText(text) {
  if (navigator.share) navigator.share({ title: 'مُعيني', text }).catch(() => {});
  else if (navigator.clipboard?.writeText) navigator.clipboard.writeText(text).then(() => toast('تم نسخ الملخص', 'success')).catch(() => toast(text));
  else toast(text);
}

async function handleClick(event) {
  const target = event.target;
  if (els.onboarding && !els.onboarding.hidden && await handleOnboardingClick(target)) return;

  const special = target.closest('[data-special-name]');
  if (special) {
    state.specialName = special.dataset.specialName;
    state.onboardingStep = 'pin';
    renderOnboarding();
    return;
  }

  const route = target.closest('[data-route]')?.dataset.route;
  if (route) { navigate(route); return; }

  const action = target.closest('[data-action]')?.dataset.action;
  if (action) {
    const actions = {
      'open-drawer': openDrawer,
      'close-drawer': closeDrawer,
      'close-modal': closeModal,
      'theme-menu': () => { els.themeMenu.hidden = !els.themeMenu.hidden; },
      'location-settings': locationModal,
      'request-notifications': requestNotifications,
      'open-mosques': openNearbyMosques,
      'use-device-location': useDeviceLocation,
      'prayer-settings': prayerSettingsModal,
      'play-adhan': playAdhanPreview,
      'stop-audio': () => stopAudio(),
      'edit-friday': editFridayModal,
      'tasbih-add': () => { state.data.azkar.tasbih += 1; state.data.stats.totalAzkarClicks += 1; saveData(); renderCurrentPage(); },
      'tasbih-reset': () => { state.data.azkar.tasbih = 0; saveData(); renderCurrentPage(); },
      'reset-azkar-category': () => { AZKAR[state.data.azkar.category].items.forEach(item => { state.data.daily.azkarCounts[item.id] = 0; }); saveData(); renderCurrentPage(); },
      'azkar-favorites': () => openModal(`<h2 id="modal-title">الأذكار المفضلة</h2><p>${state.data.azkar.favorites.length ? `لديك ${state.data.azkar.favorites.length} أذكار مفضلة.` : 'لم تضف أذكارًا إلى المفضلة بعد.'}</p><button class="primary-button full" data-action="close-modal">حسنًا</button>`),
      'continue-quran': () => selectSurah(state.data.quran.lastRead.surah, state.data.quran.lastRead.ayah || 1),
      'reload-quran': () => fetchSurah(state.data.quran.surah),
      'play-surah': playSurahAudio,
      'toggle-current-surah-favorite': toggleCurrentSurahFavorite,
      'quran-plan': () => document.querySelector('.plan-grid')?.scrollIntoView({ behavior: 'smooth' }),
      'bookmark-ayah': bookmarkAyah,
      'play-selected-ayah': playSelectedAyah,
      'mark-page-read': markPageRead,
      'customize-wird': customizeWirdModal,
      'share-wird': () => shareText(`أنجزت ${calculateWirdPercent()}% من وردي اليومي على مُعيني.`),
      'edit-monthly-goal': editMonthlyGoalModal,
      'share-achievements': () => shareText(`فتحت ${unlockedBadges().length} شارات ووصلت لأفضل سلسلة ${state.data.stats.bestStreak} يوم على مُعيني.`),
      'mark-all-read': () => { state.data.notifications.forEach(item => { item.unread = false; }); saveData(); renderApp(); },
      'edit-profile': editProfileModal,
      'logout': clearSession,
      'export-data': exportData,
      'import-data': () => document.getElementById('import-file')?.click(),
      'choose-logo': () => document.getElementById('logo-file')?.click(),
      'reset-logo': () => { state.data.settings.customLogo = ''; saveData(); applyBranding(); renderApp(); toast('تمت استعادة الشعار الأساسي', 'success'); },
      'install-app': installApp,
      'reset-data': () => { if (confirm('هل تريد حذف بيانات الحساب الحالي وإعادة البدء؟')) { state.data = createDefaultData(); if (state.user?.name) state.data.profile.name = state.user.name; saveData(); renderApp(); toast('تمت إعادة الضبط'); } }
    };
    actions[action]?.();
    return;
  }

  const theme = target.closest('[data-theme-choice]')?.dataset.themeChoice;
  if (theme) { applyTheme(theme); saveData(); renderApp(); els.themeMenu.hidden = true; return; }

  const prayer = target.closest('[data-prayer-check]')?.dataset.prayerCheck;
  if (prayer) { togglePrayer(prayer); return; }

  const friday = target.closest('[data-friday]')?.dataset.friday;
  if (friday) { toggleFriday(friday); return; }

  const azkarCategory = target.closest('[data-azkar-category]')?.dataset.azkarCategory;
  if (azkarCategory) { state.data.azkar.category = azkarCategory; saveData(); renderCurrentPage(); return; }

  const azkarCount = target.closest('[data-azkar-count]')?.dataset.azkarCount;
  if (azkarCount) { incrementAzkar(azkarCount); return; }

  const azkarFavorite = target.closest('[data-azkar-favorite]')?.dataset.azkarFavorite;
  if (azkarFavorite) { toggleAzkarFavorite(azkarFavorite); return; }

  const azkarSpeak = target.closest('[data-azkar-speak]')?.dataset.azkarSpeak;
  if (azkarSpeak) { speakAzkar(azkarSpeak); return; }

  const reciterChoice = target.closest('[data-reciter-choice]')?.dataset.reciterChoice;
  if (reciterChoice) { state.data.quran.reciter = reciterChoice; saveData(); stopAudio(false); fetchSurah(state.data.quran.surah); closeModal(); toast(`تم اختيار ${RECITERS[reciterChoice]?.label || 'القارئ'}`, 'success'); return; }

  const quranTool = target.closest('[data-quran-tool]')?.dataset.quranTool;
  if (quranTool) { handleQuranTool(quranTool); return; }

  const surah = target.closest('[data-surah]')?.dataset.surah;
  if (surah) { selectSurah(surah); return; }

  const step = target.closest('[data-surah-step]')?.dataset.surahStep;
  if (step) { selectSurah(state.data.quran.surah + (step === 'next' ? 1 : -1)); return; }

  const ayahNode = target.closest('[data-quran-ayah]');
  if (ayahNode) { selectAyah(ayahNode.dataset.quranAyah, ayahNode.dataset.audio); return; }

  const fontAction = target.closest('[data-quran-font]')?.dataset.quranFont;
  if (fontAction) { state.data.quran.fontScale = clamp(state.data.quran.fontScale + (fontAction === 'plus' ? .1 : -.1), .8, 1.6); saveData(); renderCurrentPage(); return; }

  const quranPlan = target.closest('[data-quran-plan]')?.dataset.quranPlan;
  if (quranPlan) { state.data.quran.planDays = Number(quranPlan); saveData(); renderApp(); return; }

  const wirdMode = target.closest('[data-wird-mode]')?.dataset.wirdMode;
  if (wirdMode) { state.data.wird.mode = wirdMode; saveData(); renderCurrentPage(); return; }

  const taskControl = target.closest('[data-wird-task]');
  if (taskControl) { updateWirdTask(taskControl.dataset.wirdTask, Number(taskControl.dataset.delta)); return; }

  const taskComplete = target.closest('[data-wird-complete]')?.dataset.wirdComplete;
  if (taskComplete) { completeWirdTask(taskComplete); return; }

  const notification = target.closest('[data-notification]')?.dataset.notification;
  if (notification) { const item = state.data.notifications.find(entry => entry.id === notification); if (item) item.unread = false; saveData(); renderApp(); return; }

  const articleCategory = target.closest('[data-article-category]')?.dataset.articleCategory;
  if (articleCategory) { state.articleCategory = articleCategory; renderCurrentPage(); return; }

  const article = target.closest('[data-article]')?.dataset.article;
  if (article) { openArticle(article); return; }

  const settingsTab = target.closest('[data-settings-tab]')?.dataset.settingsTab;
  if (settingsTab) { state.settingsTab = settingsTab; renderCurrentPage(); return; }
}

function handleChange(event) {
  const target = event.target;

  const prayerAlert = target.dataset.prayerAlert;
  if (prayerAlert) {
    state.data.settings.prayerAlerts[prayerAlert] = target.checked;
    saveData();
    return;
  }

  const quranSetting = target.dataset.quranSetting;
  if (quranSetting) {
    let value = target.type === 'checkbox' ? target.checked : target.value;
    if (quranSetting === 'playbackRate') value = Number(value);
    state.data.quran[quranSetting] = value;
    saveData();
    if (quranSetting === 'reciter') {
      stopAudio(false);
      fetchSurah(state.data.quran.surah);
      toast(`تم اختيار ${RECITERS[value]?.label || 'القارئ'}`, 'success');
    } else {
      if (els.audioPlayer) {
        els.audioPlayer.playbackRate = Number(state.data.quran.playbackRate || 1);
        els.audioPlayer.loop = Boolean(state.data.quran.repeatAyah) && els.audioPlayer.dataset.mode === 'quran-ayah';
      }
      saveData();
      renderCurrentPage();
    }
    return;
  }

  const setting = target.dataset.setting;
  if (setting) {
    let value = target.type === 'checkbox' ? target.checked : target.value;
    if (['volume', 'reminderMinutes', 'prayerMethod'].includes(setting)) value = value === '' ? null : Number(value);
    state.data.settings[setting] = value;

    if (setting === 'country') {
      localStorage.setItem(`${STORAGE_PREFIX}_country`, value);
      fetchPrayerTimes();
    }

    if (setting === 'volume' && els.audioPlayer) {
      els.audioPlayer.volume = clamp(Number(value || 0) / 100, 0, 1);
    }

    applyTheme(state.data.settings.theme, false);
    saveData();

    if (['largeText','reduceMotion','compactMode','highContrast','country','prayerMethod','volume','reminderMinutes','adhanVoice','azkarReminders','wirdReminder'].includes(setting)) {
      renderApp();
    }
    return;
  }

  if (target.id === 'import-file' && target.files?.[0]) {
    importDataFile(target.files[0]);
    return;
  }

  if (target.id === 'logo-file' && target.files?.[0]) {
    const file = target.files[0];
    if (!file.type.startsWith('image/')) {
      toast('اختر ملف صورة صالحًا.', 'error');
      return;
    }
    if (file.size > 1_500_000) {
      toast('حجم الشعار كبير. اختر صورة أقل من 1.5 ميجابايت.', 'error');
      return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      state.data.settings.customLogo = String(reader.result || '');
      saveData();
      applyBranding();
      renderApp();
      toast('تم تحديث شعار الموقع', 'success');
    };
    reader.onerror = () => toast('تعذر قراءة ملف الشعار.', 'error');
    reader.readAsDataURL(file);
  }
}

function handleInput(event) {
  if (event.target.id === 'quran-search') {
    state.quranSearch = event.target.value;
    const cursor = event.target.selectionStart;
    renderCurrentPage();
    const input = document.getElementById('quran-search');
    input?.focus();
    input?.setSelectionRange(cursor, cursor);
  }
  if (event.target.id === 'article-search') {
    state.articleSearch = event.target.value;
    const cursor = event.target.selectionStart;
    renderCurrentPage();
    const input = document.getElementById('article-search');
    input?.focus();
    input?.setSelectionRange(cursor, cursor);
  }
}

async function handleSubmit(event) {
  event.preventDefault();
  const form = event.target;
  if (form.id === 'special-pin-form') { await handleSpecialPinSubmit(form); return; }
  if (form.id === 'profile-form') {
    state.data.profile.name = form.elements.name.value.trim() || state.data.profile.name;
    state.data.profile.bio = form.elements.bio.value.trim();
    if (state.user) state.user.name = state.data.profile.name;
    if (state.user) localStorage.setItem(`${STORAGE_PREFIX}_session`, JSON.stringify(state.user));
    saveData(); closeModal(); renderApp(); toast('تم حفظ الملف', 'success');
  } else if (form.id === 'location-form') {
    state.data.settings.country = form.elements.country.value;
    localStorage.setItem(`${STORAGE_PREFIX}_country`, state.data.settings.country);
    saveData(); closeModal(); await fetchPrayerTimes(); renderApp(); toast('تم تحديث الموقع والمواقيت', 'success');
  } else if (form.id === 'prayer-settings-form') {
    state.data.settings.reminderMinutes = Number(form.elements.minutes.value);
    state.data.settings.adhanVoice = form.elements.voice.value;
    saveData(); closeModal(); renderApp(); toast('تم حفظ إعدادات الصلاة', 'success');
  } else if (form.id === 'friday-form') {
    state.data.friday.sermonTime = form.elements.time.value || '12:30';
    saveData(); closeModal(); renderCurrentPage(); toast('تم حفظ موعد الجمعة', 'success');
  } else if (form.id === 'monthly-goal-form') {
    state.data.wird.monthlyGoal = clamp(Number(form.elements.goal.value), 1, 30);
    saveData(); closeModal(); renderCurrentPage(); toast('تم حفظ الهدف', 'success');
  } else if (form.id === 'wird-form') {
    WIRD_TASKS.forEach(task => { state.data.wird.targets[task.id] = clamp(Number(form.elements[task.id].value) || task.target, 1, 500); });
    saveData(); closeModal(); renderCurrentPage(); toast('تم حفظ أهداف الورد', 'success');
  }
}

function handleHashChange() {
  const page = location.hash.replace('#','') || 'home';
  if (state.user) navigate(page, { replace: true });
}

function handleOutsideClick(event) {
  if (!event.target.closest('.theme-switcher')) els.themeMenu.hidden = true;
  if (event.target === els.modal) closeModal();
}

async function bootstrap() {
  cacheElements();
  applyTheme(localStorage.getItem(`${STORAGE_PREFIX}_theme`) || 'night', false);
  setupAudioEvents();

  document.addEventListener('click', handleClick);
  document.addEventListener('change', handleChange);
  document.addEventListener('input', handleInput);
  document.addEventListener('submit', handleSubmit);
  document.addEventListener('click', handleOutsideClick);
  window.addEventListener('hashchange', handleHashChange);
  window.addEventListener('beforeinstallprompt', event => { event.preventDefault(); state.installPrompt = event; });
  window.addEventListener('keydown', event => {
    if (event.key === 'Escape') {
      closeModal();
      closeDrawer();
      els.themeMenu.hidden = true;
      if ('speechSynthesis' in window) speechSynthesis.cancel();
    }
  });

  // نسخة الملف الواحد لا تسجل Service Worker خارجيًا.
  loadSession();
  applyBranding();
  await initSupabase();

  if (state.user && els.app.hidden) startApp();
  else if (!state.user) showOnboarding('country');

  setTimeout(() => els.splash.classList.add('is-hidden'), 550);
  setTimeout(() => els.splash.remove(), 1100);
}

function v11DayIndex(list){
 const start = new Date(new Date().getFullYear(),0,0);
 const diff = new Date() - start;
 return Math.floor(diff/86400000) % list.length;
}

function inferAvatarKind(name=''){

 if(women.includes(first)) return 'woman';
 if(men.includes(first)) return 'man';

function ensureV11Data(){
 const def=createDefaultData();
 state.data=deepMerge(def,state.data||{});
 if(!state.data.profile.avatarCustom){
  const kind=state.data.profile.avatarKind==='neutral'?inferAvatarKind(state.data.profile.name):state.data.profile.avatarKind;
  state.data.profile.avatarKind=kind;
  state.data.profile.avatar=v11AvatarSVG(kind);
  if(state.user) state.user.avatar=state.data.profile.avatar;
 }
 state.data.activityLog=state.data.activityLog||{};
 state.data.ui=state.data.ui||def.ui;
}
function activityFor(key=dateKey()){
 state.data.activityLog[key]=state.data.activityLog[key]||{login:0,prayers:0,azkar:0,quranPages:0,wird:0,hifz:0};
 return state.data.activityLog[key];
}
function markActivity(type,amount=1){
 const a=activityFor();
 if(type==='login') a.login=1;
 else a[type]=Math.max(0,(a[type]||0)+amount);
 saveData();
}
function dayScore(key=dateKey(),scope='all'){
 const a=state.data.activityLog?.[key];
 if(!a) return 2;
 if(scope==='prayers') return clamp(Math.round((a.prayers||0)/5*100),2,100);
 const score=(a.login?5:0)+Math.min(a.prayers||0,5)*7+Math.min(a.azkar||0,20)+Math.min(a.quranPages||0,10)*2+Math.min(a.wird||0,20)+Math.min(a.hifz||0,10)*2;
 return clamp(Math.round(score),2,100);
}
function recentSevenScores(scope='all'){
 const out=[];
 for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);out.push({key:dateKey(d),day:new Intl.DateTimeFormat('ar-EG',{weekday:'short'}).format(d),score:dayScore(dateKey(d),scope)});}
 return out;
}
function weeklyChartV11(scope='all'){
 return `<div class="week-chart-v11">${recentSevenScores(scope).map(x=>`<div class="week-day-v11"><b>${x.score}%</b><div class="week-bar-track"><i class="week-bar-fill" style="height:${x.score}%"></i></div><small>${x.day}</small></div>`).join('')}</div>`;
}

const V10_LOAD_CLOUD = loadCloudData;
loadCloudData = async function(){
 if(!state.supabase || state.user?.type!=='google') return;
 try{
  const {data,error}=await state.supabase.from('muaini_user_data').select('data,updated_at').eq('user_id',state.user.id).maybeSingle();
  if(error) throw error;
  if(data?.data){
   const customAvatar=data.data?.profile?.avatarCustom ? data.data.profile.avatar : '';
   state.data=deepMerge(createDefaultData(),data.data);
   state.data.profile.name=state.user.name;
   state.data.profile.email=state.user.email;
   if(customAvatar){
    state.data.profile.avatar=customAvatar;
    state.data.profile.avatarCustom=true;
   }else{
    const kind=state.data.profile.avatarKind||inferAvatarKind(state.user.name);
    state.data.profile.avatarKind=kind;
    state.data.profile.avatar=v11AvatarSVG(kind);
   }
   ensureV11Data();
   saveData({sync:false});
  }
 }catch(error){console.warn('تعذر تحميل البيانات السحابية',error);}
};

acceptGoogleSession = async function(user){
 const meta=user.user_metadata||{};
 const name=meta.full_name||meta.name||user.email?.split('@')[0]||'مستخدم Google';
 const kind=inferAvatarKind(name);
 setSession({type:'google',id:user.id,name,email:user.email||'',avatar:v11AvatarSVG(kind)});
 loadData();
 ensureV11Data();
 state.data.profile.name=name;
 state.data.profile.email=user.email||'';
 if(!state.data.profile.avatarCustom){
  state.data.profile.avatarKind=kind;
  state.data.profile.avatar=v11AvatarSVG(kind);
 }
 await loadCloudData();
 sessionStorage.removeItem(`${STORAGE_PREFIX}_welcome_done`);
 startApp({skipLoad:true,forceWelcome:true});
};

function mushafPageMarkup(data){
 if(!data?.ayahs?.length) return `<div class="loading-box"><span class="spinner"></span><span>جاري تحميل صفحة المصحف…</span></div>`;
 let lastSurah=0;
 const parts=[];
 data.ayahs.forEach(a=>{
  if(a.surah?.number!==lastSurah){
   lastSurah=a.surah.number;
   parts.push(`<div class="surah-heading">سورة ${escapeHTML(a.surah.name||SURAHS[a.surah.number-1]?.name||'')}</div>`);
   if(a.numberInSurah===1 && a.surah.number!==1 && a.surah.number!==9) parts.push(`<div class="center" style="margin:8px 0">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>`);

  parts.push(`<span class="mushaf-ayah" data-fav-type="ayah" data-surah="${a.surah.number}" data-ayah="${a.numberInSurah}" data-global="${a.number}" data-page="${data.page}" data-text="${escapeHTML(a.text)}">${escapeHTML(a.text)} <span class="ayah-number">${a.numberInSurah}</span></span> `);
 });
 return parts.join('');
}

async function loadMushafPage(page,direction=''){
 page=clamp(Number(page),1,604);
 try{
  let data=state.v11PageCache.get(page);
  if(!data){
   const payload=await fetchJSON(`https://api.alquran.cloud/v1/page/${page}/quran-uthmani`);
   const ayahs=payload?.data?.ayahs||[];
   data={page,ayahs};
   state.v11PageCache.set(page,data);
  }
  if(state.data.ui.quranPanel!=='mushaf'||Number(state.data.quran.lastPage)!==page) return;
  state.v11PageData=data;
  renderCurrentPage();
  requestAnimationFrame(()=>{
   const el=document.getElementById('mushaf-page');
   if(direction) el?.classList.add(direction==='next'?'turn-next':'turn-prev');
   setupMushafSwipe();
  });
 }catch(error){
  const node=document.getElementById('mushaf-page');
  if(node) node.innerHTML=`<div class="empty-state"><b>تعذر تحميل الصفحة</b><span>تأكد من اتصال الإنترنت ثم أعد المحاولة.</span><button class="primary-button" data-v11="mushaf-retry">إعادة المحاولة</button></div>`;
 }

function setupMushafSwipe(){
 const el=document.getElementById('mushaf-page');
 if(!el||el.dataset.swipeReady) return;
 el.dataset.swipeReady='1';
 let startX=0,startY=0;
 el.addEventListener('touchstart',e=>{startX=e.changedTouches[0].clientX;startY=e.changedTouches[0].clientY},{passive:true});
 el.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-startX,dy=e.changedTouches[0].clientY-startY;
  if(Math.abs(dx)>65&&Math.abs(dx)>Math.abs(dy)*1.3) goMushafPage((state.data.quran.lastPage||1)+(dx<0?1:-1),dx<0?'next':'prev');
 },{passive:true});
}
function goMushafPage(page,direction='next'){
 const old=Number(state.data.quran.lastPage||1);
 const next=clamp(Number(page),1,604);
 if(next===old) return;
 state.data.quran.lastPage=next;
 state.data.quran.lastRead={page:next};
 state.v11PageData=null;
 markActivity('quranPages',1);
 updateReadingPlanProgress(old,next);
 saveData();
 loadMushafPage(next,direction);
}

function localTafsirSuggestions(value){
 const q=value.trim();
 const out=[];
 const colon=q.match(/^(\d{1,3})\s*[:：]\s*(\d{1,3})$/);
 if(colon){
  const s=Number(colon[1]),a=Number(colon[2]);
  if(s>=1&&s<=114&&a>=1&&a<=(SURAHS[s-1]?.ayahs||999)) out.push({type:'ayah',surah:s,ayah:a,title:`سورة ${SURAHS[s-1].name} — الآية ${a}`,sub:'انتقال مباشر إلى التفسير'});
 }
 const num=Number(q.replace(/[^\d]/g,''));
 if(Number.isFinite(num)&&num>0){
  if(num<=114) out.push({type:'surah',surah:num,title:`سورة ${SURAHS[num-1].name}`,sub:`${SURAHS[num-1].ayahs} آية`});
  if(num<=604) out.push({type:'page',page:num,title:`صفحة ${num}`,sub:'فتح الصفحة في المصحف'});
  if(num<=30) out.push({type:'juz',page:Math.max(1,Math.round((num-1)*604/30)+1),title:`الجزء ${num}`,sub:'فتح بداية الجزء تقريبياً'});
 }
 SURAHS.filter(s=>s.name.includes(q)).slice(0,10).forEach(s=>out.push({type:'surah',surah:s.number,title:`سورة ${s.name}`,sub:`${s.ayahs} آية`}));
 return out;
}

 },420);
}

function playV11QueueItem(){

 els.audioPlayer.dataset.mode='v11-listen';

 els.audioPlayer.playbackRate=Number(state.data.quran.playbackRate||1);
 els.audioPlayer.volume=clamp(Number(state.data.settings.volume||75)/100,0,1);
 els.audioPlayer.play().catch(()=>toast('اضغط تشغيل مرة أخرى للسماح بالصوت.','error'));

function stopV11Listening(byTimer=false){
 clearTimeout(state.v11ListenTimer);
 state.v11AudioQueue=[];
 state.v11AudioIndex=0;
 els.audioPlayer.pause();
 els.audioPlayer.removeAttribute('src');
 els.audioPlayer.load();

function v11AudioEnded(){

function updateReadingPlanProgress(oldPage,newPage){
 const p=state.data.wird?.readingPlan;
 if(!p?.active) return;
 const today=dateKey();
 if(p.lastDate!==today){p.lastDate=today;p.todayStart=oldPage;p.todayRead=0;p.completedDate='';}
 p.currentPage=newPage;
 if(newPage===oldPage+1) p.todayRead=(p.todayRead||0)+1;
 if((p.todayRead||0)>=Number(p.pagesPerDay||1) && p.completedDate!==today){

function normalizeArabic(text=''){
 return text.normalize('NFD').replace(/[\u064B-\u065F\u0670\u06D6-\u06ED]/g,'').replace(/[إأآٱ]/g,'ا').replace(/ى/g,'ي').replace(/ة/g,'ه').replace(/[^\u0621-\u064A0-9\s]/g,' ').replace(/\s+/g,' ').trim();
}
function compareHifzTranscript(spoken){
 const expected=normalizeArabic((state.v11HifzData?.ayahs||[]).map(a=>a.text).join(' ')).split(' ');
 const got=normalizeArabic(spoken).split(' ').filter(Boolean);
 let errors=0;
 const html=got.map((word,i)=>{
  const ok=word===expected[i];
  if(!ok) errors++;
  return `<span class="${ok?'word-ok':'word-bad'}" title="${ok?'صحيحة':`الصحيح: ${escapeHTML(expected[i]||'—')}`}">${escapeHTML(word)}</span>`;
 }).join(' ');
 errors+=Math.max(0,Math.min(expected.length,got.length+5)-got.length);
 state.v11HifzErrors=errors;
 state.v11TranscriptHTML=html||'<span class="muted">لم يتم التعرف على كلام واضح.</span>';
 return errors;
}
function toggleHifzRecognition(){
 const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
 if(!SR){toast('التعرف الصوتي العربي غير مدعوم في هذا المتصفح. جرّب Chrome أو Edge.','error');return;}
 if(state.v11Recognizing&&state.v11Recognition){state.v11Recognition.stop();return;}
 state.v11HifzHide=true;state.v11Recognizing=true;state.v11TranscriptHTML='';state.v11HifzErrors=0;renderCurrentPage();
 const rec=new SR();state.v11Recognition=rec;rec.lang='ar-SA';rec.continuous=true;rec.interimResults=true;
 rec.onresult=e=>{let text='';for(let i=0;i<e.results.length;i++) text+=e.results[i][0].transcript+' ';compareHifzTranscript(text);const n=document.querySelector('.hifz-transcript');if(n)n.innerHTML=state.v11TranscriptHTML;const note=document.getElementById('hifz-review-note');if(note)note.innerHTML=state.v11HifzErrors>=Number(state.data.wird.hifzPlan.maxErrors||3)?'<div class="welcome-message" style="border-color:var(--danger)">راجع الكلمات الحمراء؛ تجاوزت حد الأخطاء المحدد.</div>':'';};
 rec.onerror=()=>toast('تعذر التقاط الصوت. راجع إذن الميكروفون.','error');
 rec.onend=()=>{state.v11Recognizing=false;markActivity('hifz',Math.max(1,Number(state.data.wird.hifzPlan.amount||1)));renderCurrentPage();};
 rec.start();
}

searchTafsirSuggestions=async function(value){
 state.v11SearchQuery=value;
 const local=localTafsirSuggestions(value);
 state.v11SearchResults=local;
 renderCurrentPage();
 requestAnimationFrame(()=>{const i=document.getElementById('v11-tafsir-search');if(i){i.focus();i.setSelectionRange(value.length,value.length);}});
 clearTimeout(state.v11SearchTimer);
 if(value.trim().length<3)return;
 state.v11SearchTimer=setTimeout(async()=>{
  try{
   const payload=await fetchJSON(`https://api.alquran.cloud/v1/search/${encodeURIComponent(value.trim())}/all/quran-uthmani`);
   const matches=payload?.data?.matches||[];
   state.v11SearchResults=[...local,...matches.slice(0,12).map(m=>({type:'ayah',surah:m.surah.number,ayah:m.numberInSurah,title:`${m.surah.name} — آية ${m.numberInSurah}`,sub:m.text}))];
   renderCurrentPage();
   requestAnimationFrame(()=>{const i=document.getElementById('v11-tafsir-search');if(i){i.focus();i.setSelectionRange(value.length,value.length);}});
  }catch{}
 },420);
};
checkV11Reminders=function(){
 if(!state.user||document.hidden||!('Notification'in window)||Notification.permission!=='granted')return;
 const now=new Date(),hm=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
 if(state.lastMinuteChecked===hm)return;state.lastMinuteChecked=hm;
 const s=state.data.settings;
 if(s.azkarReminders&&hm===s.morningAzkarTime)new Notification('أذكار الصباح',{body:'ابدأ يومك بذكر الله.'});
 if(s.azkarReminders&&hm===s.eveningAzkarTime)new Notification('أذكار المساء',{body:'اختم يومك بذكر الله.'});
 if(s.wirdReminder&&hm===s.wirdReminderTime)new Notification('وردك اليومي',{body:'خطوة صغيرة الآن تحمي الاستمرار.'});
};

const V11_MUSHAF_DRAWER_BASE=renderMushafDrawer;
renderMushafDrawer=function(data){
 const first=data?.ayahs?.[0],surah=Number(first?.surah?.number||1);
 const active=(state.data.quran.favoriteSurahs||[]).includes(surah);
 return V11_MUSHAF_DRAWER_BASE(data).replace('</aside>',`<button class="secondary-button full" style="margin-top:9px" data-v11="favorite-surah" data-surah="${surah}">${active?'♥ إزالة السورة من المفضلة':'♡ حفظ السورة في المفضلة'}</button></aside>`);
};
const V11_FAVORITES_BASE=renderFavoritesPanel;
renderFavoritesPanel=function(){
 const list=state.data.quran.favorites||[];
 const favSurahs=state.data.quran.favoriteSurahs||[];
 return `<div class="slide-panel panel">
  <div class="subpage-head"><div><span class="eyebrow">المفضلة</span><h2>السور والآيات والتفاسير</h2></div><button class="ghost-button" data-v11="quran-home">القرآن الكريم</button></div>
  ${favSurahs.length?`<h3>السور المفضلة</h3><div class="surah-index-v11" style="margin:9px 0 16px">${favSurahs.map(n=>`<button data-v11="favorite-surah-open" data-surah="${n}">سورة ${SURAHS[n-1]?.name||''}</button>`).join('')}</div>`:''}
  ${list.length?`<div class="stack">${list.map(f=>`<article class="favorite-card"><div class="row-between"><b>${f.type==='tafsir'?'تفسير':'آية'} — سورة ${escapeHTML(SURAHS[(f.surah||1)-1]?.name||'')}</b><button class="danger-button" data-v11="favorite-delete" data-id="${f.id}">حذف</button></div><div class="fav-text">${escapeHTML(f.text)}</div>${f.tafsir?`<p>${escapeHTML(f.tafsir)}</p>`:''}${f.note?`<div class="welcome-message"><b>ما الملفت فيها؟</b><br>${escapeHTML(f.note)}</div>`:''}<button class="secondary-button" data-v11="favorite-open" data-page="${f.page||1}">فتح الموضع</button></article>`).join('')}</div>`:(favSurahs.length?'':emptyWatermark('لم تحفظ أي سورة أو آية أو تفسير بعد.'))}
 </div>`;
};
const V11_CLICK_FAVORITES_BASE=handleClick;
handleClick=async function(event){
 const v=event.target.closest?.('[data-v11]');
 if(v?.dataset.v11==='favorite-surah'){
  const n=Number(v.dataset.surah),list=state.data.quran.favoriteSurahs||[];
  state.data.quran.favoriteSurahs=list.includes(n)?list.filter(x=>x!==n):[...list,n];saveData();renderCurrentPage();return;
 }
 if(v?.dataset.v11==='favorite-surah-open'){await goToSurahInMushaf(Number(v.dataset.surah));state.data.ui.quranPanel='mushaf';saveData();return;}
 return V11_CLICK_FAVORITES_BASE(event);
};


const V11_FETCH_BASE=fetchJSON;
fetchJSON=async function(url,timeout=14000){
 try{return await V11_FETCH_BASE(url,Math.min(timeout,10000));}
 catch(firstError){
  if(String(url).includes('api.alquran.cloud')){
   const backup=String(url).replace('api.alquran.cloud','alquran.api.islamic.network');
   return V11_FETCH_BASE(backup,Math.min(timeout,10000));
  }
  throw firstError;
 }
};
